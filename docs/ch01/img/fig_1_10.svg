<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Hello Class Box -->
  <g filter="url(#shadow)">
    <rect x="40" y="50" width="220" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="45" y="42" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b">클래스명: Hello</text>
    
    <!-- Outer caller section -->
    <rect x="60" y="65" width="120" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="70" y="81" font-family="monospace" font-size="11" fill="#64748b">...</text>

    <!-- Internal Factory method box (new Korean) -->
    <rect x="60" y="130" width="140" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.5" />
    <text x="70" y="149" font-family="monospace" font-size="12" font-weight="bold" fill="#0f172a">new Korean;</text>
  </g>

  <!-- Internal Call Arrow -->
  <g>
    <line x1="120" y1="90" x2="120" y2="125" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="116,125 120,130 124,125" fill="#94a3b8" />
    <text x="130" y="112" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569">내부 메서드 호출</text>
  </g>

  <!-- Korean Class Box -->
  <g filter="url(#shadow)">
    <rect x="370" y="75" width="150" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="375" y="67" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b">클래스명: Korean</text>
    <text x="390" y="110" font-family="monospace" font-size="12" fill="#64748b">...</text>
  </g>

  <!-- Arrow from Hello's internal factory to Korean class -->
  <g>
    <!-- Right-up arrow from Hello new Korean box to Korean box -->
    <path d="M 200,145 L 330,145 L 330,105 L 365,105" fill="none" stroke="#ea580c" stroke-width="2" />
    <polygon points="365,100 375,105 365,110" fill="#ea580c" />
  </g>
</svg>
