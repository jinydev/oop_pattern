<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Visitor Object (Left - long container) -->
  <g transform="translate(30, 40)" filter="url(#shadow)">
    <rect width="110" height="300" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 102,0 A 8,8 0 0 1 110,8 L 110,35 L 0,35 Z" fill="#475569" />
    <text x="55" y="22" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">visitor</text>
    
    <!-- Repeated order() slots representing sequential processing -->
    <rect x="15" y="60" width="80" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="55" y="78" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">order(1)</text>

    <rect x="15" y="150" width="80" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="55" y="168" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">order(2)</text>

    <rect x="15" y="240" width="80" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="55" y="258" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">order(3)</text>
  </g>

  <!-- Visitable Objects Stack (Right) -->
  <!-- Visitable 1 -->
  <g transform="translate(330, 40)" filter="url(#shadow)">
    <rect width="130" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="-10,0 65,-14 140,0" fill="#ea580c" />
    <text x="65" y="15" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">visitable</text>
    <rect x="15" y="25" width="100" height="45" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="42" font-family="'Inter', sans-serif" font-size="9" fill="#0f172a" text-anchor="middle">product</text>
    <line x1="15" y1="48" x2="115" y2="48" stroke="#e2e8f0" stroke-width="1" />
    <text x="65" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#0f172a" text-anchor="middle">cart (컵라면)</text>
  </g>

  <!-- Visitable 2 -->
  <g transform="translate(330, 150)" filter="url(#shadow)">
    <rect width="130" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="-10,0 65,-14 140,0" fill="#ea580c" />
    <text x="65" y="15" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">visitable</text>
    <rect x="15" y="25" width="100" height="45" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="42" font-family="'Inter', sans-serif" font-size="9" fill="#0f172a" text-anchor="middle">product</text>
    <line x1="15" y1="48" x2="115" y2="48" stroke="#e2e8f0" stroke-width="1" />
    <text x="65" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#0f172a" text-anchor="middle">cart (아이스크림)</text>
  </g>

  <!-- Visitable 3 -->
  <g transform="translate(330, 240)" filter="url(#shadow)">
    <rect width="130" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="-10,0 65,-14 140,0" fill="#ea580c" />
    <text x="65" y="15" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">visitable</text>
    <rect x="15" y="25" width="100" height="45" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="42" font-family="'Inter', sans-serif" font-size="9" fill="#0f172a" text-anchor="middle">product</text>
    <line x1="15" y1="48" x2="115" y2="48" stroke="#e2e8f0" stroke-width="1" />
    <text x="65" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#0f172a" text-anchor="middle">cart (음료수)</text>
  </g>

  <!-- Arrows row 1 -->
  <g>
    <!-- accept -->
    <path d="M 155,65 L 315,65" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="315,62 321,65 315,68" fill="#ef4444" />
    <text x="235" y="58" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">① accept</text>

    <!-- order -->
    <path d="M 315,95 L 155,95" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" />
    <polygon points="155,98 149,95 155,92" fill="#ef4444" />
    <text x="235" y="88" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">② order</text>
  </g>

  <!-- Arrows row 2 -->
  <g>
    <!-- accept -->
    <path d="M 155,175 L 315,175" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="315,172 321,175 315,178" fill="#ef4444" />
    <text x="235" y="168" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">③ accept</text>

    <!-- order -->
    <path d="M 315,205 L 155,205" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" />
    <polygon points="155,208 149,205 155,202" fill="#ef4444" />
    <text x="235" y="198" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">④ order</text>
  </g>

  <!-- Arrows row 3 -->
  <g>
    <!-- accept -->
    <path d="M 155,265 L 315,265" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="315,262 321,265 315,268" fill="#ef4444" />
    <text x="235" y="258" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">⑤ accept</text>

    <!-- order -->
    <path d="M 315,295 L 155,295" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" />
    <polygon points="155,298 149,295 155,292" fill="#ef4444" />
    <text x="235" y="288" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">⑥ order</text>
  </g>
</svg>
