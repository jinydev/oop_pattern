<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="100%">
  <defs>
    <!-- Shadow Filter -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.1" />
    </filter>
    <!-- Gradients -->
    <linearGradient id="gradient-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="gradient-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Box: 클래스 선언 -->
  <g filter="url(#drop-shadow)">
    <rect x="40" y="60" width="120" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="100" y="98" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">클래스</text>
    <text x="100" y="122" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">선언</text>
  </g>

  <!-- Arrow with "new" keyword -->
  <g>
    <line x1="160" y1="100" x2="270" y2="100" stroke="#94a3b8" stroke-width="3" />
    <!-- Arrowhead -->
    <polygon points="270,95 280,100 270,105" fill="#94a3b8" />
    <!-- Keyword label -->
    <rect x="195" y="75" width="40" height="20" rx="4" fill="#f1f5f9" />
    <text x="215" y="89" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>
  </g>

  <!-- Right Area: 메모리 Boundary -->
  <g>
    <!-- Memory border -->
    <rect x="300" y="30" width="160" height="140" rx="10" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4" />
    <text x="380" y="22" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">메모리</text>

    <!-- Inside Memory: 객체 Box -->
    <g filter="url(#drop-shadow)">
      <rect x="320" y="60" width="120" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <text x="380" y="106" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#0f172a" text-anchor="middle">객체</text>
    </g>
  </g>
</svg>
