<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Client (Object A) -->
  <g filter="url(#shadow)">
    <rect x="35" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="74" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">객체 A (Client)</text>
  </g>

  <!-- Proxy -->
  <g filter="url(#shadow)">
    <rect x="185" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="230" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">프록시</text>
  </g>

  <!-- Real Subject (Object B) -->
  <g filter="url(#shadow)">
    <rect x="335" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="380" y="74" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">실체 객체 B</text>
  </g>

  <!-- Connections -->
  <g>
    <!-- client -> proxy -->
    <path d="M 125,70 L 177,70" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="177,66 185,70 177,74" fill="#475569" />
    <text x="151" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">호출</text>

    <!-- proxy -> real (disconnected, showing interface matching but no direct delegation reference) -->
    <path d="M 275,70 L 327,70" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,4" />
    <polygon points="327,66 335,70 327,74" fill="#64748b" />
    <text x="301" y="60" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#64748b" text-anchor="middle">인터페이스</text>
  </g>
</svg>
