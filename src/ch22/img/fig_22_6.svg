<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- SandWich Superclass (Left) -->
  <g transform="translate(20, 45)" filter="url(#shadow)">
    <rect width="120" height="110" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 114,0 A 6,6 0 0 1 120,6 L 120,25 L 0,25 Z" fill="#3b82f6" />
    <text x="60" y="16" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">SandWich</text>
    
    <!-- sandwich scale graphic inside superclass -->
    <g transform="translate(25, 35) scale(0.5)">
      <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
      <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
    </g>
  </g>

  <!-- StrawberryBagel Class Box (Right) -->
  <g transform="translate(170, 20)" filter="url(#shadow)">
    <rect width="270" height="170" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 264,0 A 6,6 0 0 1 270,6 L 270,25 L 0,25 Z" fill="#475569" />
    <text x="135" y="16" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">StrawberryBagel</text>

    <!-- Strawberry Base Class (Dotted boundary inside) -->
    <g transform="translate(15, 35)">
      <rect width="110" height="120" fill="none" stroke="#64748b" stroke-dasharray="3,2" stroke-width="1.2" />
      <text x="55" y="-5" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#475569" text-anchor="middle">Strawberry (상속)</text>

      <g transform="translate(10, 15)">
        <rect width="90" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
        <text x="45" y="19" font-family="monospace" font-size="9" font-weight="bold" fill="#64748b" text-anchor="middle">Bread()</text>
      </g>

      <g transform="translate(10, 65)">
        <rect width="90" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
        <text x="45" y="19" font-family="monospace" font-size="9" font-weight="bold" fill="#64748b" text-anchor="middle">Jam()</text>
      </g>
    </g>

    <!-- Subclass override method -->
    <g transform="translate(150, 80)">
      <rect width="105" height="40" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2" />
      <text x="52" y="20" font-family="monospace" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">Bread()</text>
      <text x="52" y="32" font-family="'Inter', sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">오버라이드 (Override)</text>
    </g>
  </g>

  <!-- Connective Dotted Red Arrow (Override indicator) -->
  <path d="M 275,85 Q 295,75 315,95" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.2" />
  <polygon points="314,91 320,97 311,98" fill="#ef4444" />
</svg>
