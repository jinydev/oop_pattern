<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Visitor Object (Left) -->
  <g transform="translate(30, 45)" filter="url(#shadow)">
    <rect width="110" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 102,0 A 8,8 0 0 1 110,8 L 110,30 L 0,30 Z" fill="#475569" />
    <text x="55" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">visitor</text>
    
    <!-- Method Inside Visitor -->
    <rect x="10" y="45" width="90" height="24" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="55" y="60" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">order()</text>
  </g>

  <!-- Visitable Object (Right) -->
  <g transform="translate(290, 45)" filter="url(#shadow)">
    <rect width="130" height="110" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <!-- Roof-like shape for visual similarity to house -->
    <polygon points="-10,0 65,-18 140,0" fill="#ea580c" />
    <text x="65" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">visitable</text>

    <!-- Internal structure of Visitable (product/cart) -->
    <rect x="15" y="35" width="100" height="60" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
    <text x="65" y="55" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0f172a" text-anchor="middle">product</text>
    <line x1="15" y1="65" x2="115" y2="65" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="82" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0f172a" text-anchor="middle">cart</text>
  </g>

  <!-- Interaction arrows -->
  <!-- ① accept (Visitor -> Visitable) -->
  <g>
    <path d="M 155,75 L 275,75" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="275,71 283,75 275,79" fill="#ef4444" />
    <rect x="180" y="58" width="70" height="15" rx="3" fill="#ffffff" stroke="#ef4444" stroke-width="1" />
    <text x="215" y="69" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">① accept</text>
  </g>

  <!-- ② order (Visitable -> Visitor callback) -->
  <g>
    <path d="M 275,120 L 155,120" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="155,124 147,120 155,116" fill="#ef4444" />
    <rect x="180" y="112" width="70" height="15" rx="3" fill="#ffffff" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2" />
    <text x="215" y="123" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">② order</text>
  </g>
</svg>
