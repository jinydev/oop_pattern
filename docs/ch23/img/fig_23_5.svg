<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: Client Flow -->
  <g transform="translate(40, 20)">
    <!-- 코드1 -->
    <rect x="15" y="5" width="80" height="26" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
    <text x="55" y="21" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">코드1</text>

    <!-- Arrow 1 -->
    <path d="M 55,31 L 55,45" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="52,45 55,50 58,45" fill="#64748b" />

    <!-- Dashed Empty slot -->
    <rect x="0" y="50" width="110" height="80" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.2" />
    <text x="55" y="94" font-family="'Inter', sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">(빈 공간)</text>

    <!-- Arrow 2 -->
    <path d="M 55,130 L 55,145" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="52,145 55,150 58,145" fill="#64748b" />

    <!-- 코드5 -->
    <rect x="15" y="150" width="80" height="26" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
    <text x="55" y="166" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">코드5</text>
  </g>

  <!-- Middle arrow: 분리 (Extraction) -->
  <g transform="translate(180, 100)">
    <path d="M 0,0 L 70,0" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.5" />
    <polygon points="70,-4 78,0 70,4" fill="#ef4444" />
    <text x="35" y="-10" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">분리</text>
  </g>

  <!-- Right: Encapsulated Algorithm Box -->
  <g transform="translate(290, 30)" filter="url(#shadow)">
    <rect width="130" height="130" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 122,0 A 8,8 0 0 1 130,8 L 130,25 L 0,25 Z" fill="#10b981" />
    <text x="65" y="16" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">알고리즘 (Algorithm)</text>

    <!-- 코드2 -->
    <rect x="25" y="35" width="80" height="22" rx="3" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" />
    <text x="65" y="49" font-family="monospace" font-size="9" fill="#065f46" text-anchor="middle">코드2</text>

    <!-- arrow -->
    <path d="M 65,57 L 65,65" fill="none" stroke="#059669" stroke-width="1" />
    <polygon points="63,65 65,68 67,65" fill="#059669" />

    <!-- 코드3 -->
    <rect x="25" y="68" width="80" height="22" rx="3" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" />
    <text x="65" y="82" font-family="monospace" font-size="9" fill="#065f46" text-anchor="middle">코드3</text>

    <!-- arrow -->
    <path d="M 65,90 L 65,98" fill="none" stroke="#059669" stroke-width="1" />
    <polygon points="63,98 65,101 67,98" fill="#059669" />

    <!-- 코드4 -->
    <rect x="25" y="101" width="80" height="22" rx="3" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" />
    <text x="65" y="115" font-family="monospace" font-size="9" fill="#065f46" text-anchor="middle">코드4</text>
  </g>
</svg>
