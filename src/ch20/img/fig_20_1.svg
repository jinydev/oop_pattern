<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- State 0x01 -->
  <g transform="translate(30, 45)" filter="url(#shadow)">
    <circle cx="25" cy="25" r="25" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="25" y="29" font-family="monospace" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">0x01</text>
  </g>

  <!-- State 0x02 -->
  <g transform="translate(165, 45)" filter="url(#shadow)">
    <circle cx="25" cy="25" r="25" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="25" y="29" font-family="monospace" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">0x02</text>
  </g>

  <!-- State 0x04 -->
  <g transform="translate(300, 45)" filter="url(#shadow)">
    <circle cx="25" cy="25" r="25" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="25" y="29" font-family="monospace" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">0x04</text>
  </g>

  <!-- Connecting Arrows -->
  <g>
    <!-- 0x01 -> 0x02 -->
    <path d="M 85,70 L 157,70" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="157,66 165,70 157,74" fill="#64748b" />
    <text x="120" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">주문</text>

    <!-- 0x02 -> 0x04 -->
    <path d="M 220,70 L 292,70" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="292,66 300,70 292,74" fill="#64748b" />
    <text x="255" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">결제</text>
  </g>
</svg>
