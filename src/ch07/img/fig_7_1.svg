<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- 1: 클라이언트 -->
  <text x="40" y="74" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#0f172a">클라이언트</text>

  <!-- 2: 어댑터 (Adapter) -->
  <g filter="url(#shadow)">
    <rect x="155" y="45" width="110" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="210" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">어댑터</text>
    <text x="210" y="83" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">(Adapter)</text>
  </g>

  <!-- 3: 어댑티 (Adaptee) -->
  <g filter="url(#shadow)">
    <rect x="315" y="45" width="110" height="50" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="370" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">어댑티</text>
    <text x="370" y="83" font-family="'Inter', sans-serif" font-size="9" fill="#ea580c" text-anchor="middle">(Adaptee)</text>
  </g>

  <!-- Connecting Arrows -->
  <g>
    <!-- client -> adapter -->
    <path d="M 115,70 L 147,70" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="147,66 155,70 147,74" fill="#475569" />

    <!-- adapter -> adaptee -->
    <path d="M 265,70 L 307,70" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="307,66 315,70 307,74" fill="#475569" />
  </g>
</svg>
