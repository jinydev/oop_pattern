<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- SandWich Superclass (Top) -->
  <g transform="translate(40, 20)" filter="url(#shadow)">
    <rect width="150" height="110" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 144,0 A 6,6 0 0 1 150,6 L 150,25 L 0,25 Z" fill="#3b82f6" />
    <text x="75" y="16" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">SandWich (상위 클래스)</text>
    
    <!-- Sandwich scale graphic inside superclass -->
    <g transform="translate(35, 35) scale(0.5)">
      <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
      <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
    </g>
  </g>
  <text x="205" y="65" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="start">상위 클래스 (템플릿)</text>

  <!-- Strawberry Subclass (Bottom) -->
  <g transform="translate(230, 95)" filter="url(#shadow)">
    <rect width="150" height="100" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 144,0 A 6,6 0 0 1 150,6 L 150,25 L 0,25 Z" fill="#ea580c" />
    <text x="75" y="16" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Strawberry (하위 클래스)</text>

    <!-- methods -->
    <g transform="translate(15, 35)">
      <rect width="120" height="22" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
      <text x="60" y="14" font-family="monospace" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">Bread()</text>
    </g>

    <g transform="translate(15, 65)">
      <rect width="120" height="22" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
      <text x="60" y="14" font-family="monospace" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">Jam()</text>
    </g>
  </g>
  <text x="215" y="155" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="end">하위 클래스</text>

  <!-- Connecting Arrows (make calls bread and jam) -->
  <g>
    <path d="M 190,95 L 210,95 L 210,140 L 223,140" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="223,137 230,140 223,143" fill="#ef4444" />

    <path d="M 190,95 L 210,95 L 210,170 L 223,170" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="223,167 230,170 223,173" fill="#ef4444" />
  </g>
</svg>
