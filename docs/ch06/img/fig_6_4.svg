<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Variables -->
  <text x="80" y="35" font-family="monospace" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">$obj</text>
  <text x="280" y="35" font-family="monospace" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">$obj2</text>

  <!-- Two separate Objects in Memory -->
  <!-- Left Object -->
  <g filter="url(#shadow)">
    <rect x="35" y="75" width="90" height="40" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="80" y="99" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">[객체]</text>
  </g>

  <!-- Right Object -->
  <g filter="url(#shadow)">
    <rect x="235" y="75" width="90" height="40" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="280" y="99" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">[객체]</text>
  </g>

  <!-- Pointing Arrows -->
  <g>
    <path d="M 80,45 L 80,70" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="77,70 80,75 83,70" fill="#64748b" />

    <path d="M 280,45 L 280,70" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="277,70 280,75 283,70" fill="#64748b" />
  </g>

  <!-- Arrow between Objects: 깊은 복사 -->
  <g>
    <path d="M 130,95 L 227,95" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="227,91 235,95 227,99" fill="#ef4444" />
    <text x="182" y="85" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">깊은 복사</text>
  </g>
</svg>
