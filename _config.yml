title: "쉽게 배워 바로 써먹는 디자인 패턴"
description: "24가지 패턴으로 알아보는 객체지향의 원리"
author: "Hojin"
email: infohojin@naver.com
baseurl: ""
url: "https://pattern.jiny.dev"
twitter_username: infohojin

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-gist

# Navigation
nav_sort: 'priorities'

# Build Settings
destination: docs
source: src
markdown: kramdown
kramdown:
  math_engine: mathjax

defaults:
  - scope:
      path: ""
    values:
      layout: "docs"

# Sass 설정
sass:
  load_paths:
    - _sass
    - ../node_modules/bootstrap/scss

# GitHub Pages 호환성을 위한 설정
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .github/
  - .git/
  - README.md
  - package.json
  - package-lock.json
  - organize_books.py
  - generate_nav.py
