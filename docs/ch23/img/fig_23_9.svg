<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: Strategy Box (Dashed Container) -->
  <g transform="translate(30, 30)">
    <rect width="140" height="110" rx="8" fill="none" stroke="#64748b" stroke-dasharray="3,2" stroke-width="1.5" />
    <text x="70" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">전략 (Strategy)</text>

    <!-- Internal Connector / Plug Graphic -->
    <g transform="translate(45, 45)">
      <rect width="50" height="40" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" />
      <!-- Small red plug node inside -->
      <circle cx="25" cy="20" r="10" fill="#ef4444" />
      <rect x="22" y="10" width="6" height="20" fill="#ffffff" rx="1" />
      <rect x="15" y="17" width="20" height="6" fill="#ffffff" rx="1" />
    </g>
  </g>

  <!-- Connection: Delegation Arrow -->
  <g transform="translate(180, 85)">
    <path d="M 0,0 L 70,0" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.5" />
    <polygon points="70,-4 78,0 70,4" fill="#ef4444" />
    <text x="35" y="-10" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">위임 (Delegation)</text>
  </g>

  <!-- Right: Algorithm Box (Concrete/Dynamic Implementation) -->
  <g transform="translate(260, 45)" filter="url(#shadow)">
    <rect width="90" height="80" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 84,0 A 6,6 0 0 1 90,6 L 90,20 L 0,20 Z" fill="#10b981" />
    <text x="45" y="13" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">알고리즘 (Algorithm)</text>
    
    <!-- Code symbol or gear inside -->
    <circle cx="45" cy="50" r="14" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.2" />
    <text x="45" y="54" font-family="monospace" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">{}</text>
  </g>
</svg>
