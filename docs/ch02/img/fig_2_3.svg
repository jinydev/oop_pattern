<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Middle Top Box: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="210" y="20" width="120" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="270" y="50" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Left Creation flow to A 객체 -->
  <g>
    <path d="M 210,45 L 100,45 L 100,65" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="96,65 100,72 104,65" fill="#94a3b8" />
    <rect x="130" y="25" width="40" height="18" rx="3" fill="#f1f5f9" />
    <text x="150" y="38" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>
  </g>

  <!-- Right Creation flow to B 객체 -->
  <g>
    <path d="M 330,45 L 440,45 L 440,65" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="436,65 440,72 444,65" fill="#94a3b8" />
    <rect x="370" y="25" width="40" height="18" rx="3" fill="#f1f5f9" />
    <text x="390" y="38" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>
  </g>

  <!-- Orange 3D Box Left: A 객체 -->
  <g transform="translate(50, 75)" filter="url(#shadow)">
    <polygon points="30,0 80,0 65,15 15,15" fill="#fb923c" />
    <polygon points="15,15 65,15 65,55 15,55" fill="#ea580c" />
    <polygon points="65,15 80,0 80,40 65,55" fill="#c2410c" />
    <text x="40" y="40" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">A 객체</text>
  </g>

  <!-- Orange 3D Box Right: B 객체 -->
  <g transform="translate(390, 75)" filter="url(#shadow)">
    <polygon points="30,0 80,0 65,15 15,15" fill="#fb923c" />
    <polygon points="15,15 65,15 65,55 15,55" fill="#ea580c" />
    <polygon points="65,15 80,0 80,40 65,55" fill="#c2410c" />
    <text x="40" y="40" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">B 객체</text>
  </g>

  <!-- Bottom Orange 3D Box: C 객체 -->
  <g transform="translate(220, 160)" filter="url(#shadow)">
    <polygon points="30,0 80,0 65,15 15,15" fill="#fb923c" />
    <polygon points="15,15 65,15 65,55 15,55" fill="#ea580c" />
    <polygon points="65,15 80,0 80,40 65,55" fill="#c2410c" />
    <text x="40" y="40" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">C 객체</text>
  </g>

  <!-- Dotted arrows trying to link C to A & B -->
  <g>
    <!-- Arrow from C to A -->
    <path d="M 230,175 L 100,175 L 100,145" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="96,145 100,137 104,145" fill="#ef4444" />

    <!-- Arrow from C to B -->
    <path d="M 310,175 L 440,175 L 440,145" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="436,145 440,137 444,145" fill="#ef4444" />

    <!-- Text Label in the center: 정보가 공유되지 않음 -->
    <rect x="180" y="110" width="180" height="24" rx="4" fill="#fef2f2" stroke="#fee2e2" stroke-width="1" />
    <text x="270" y="126" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">정보가 공유되지 않음</text>
  </g>
</svg>
