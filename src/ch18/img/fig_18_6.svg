<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Subject Label & Box (Left) -->
  <text x="70" y="35" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0f172a">주체 (Subject)</text>
  <g transform="translate(45, 50)" filter="url(#shadow)">
    <!-- Array representation -->
    <rect x="0" y="0" width="50" height="25" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="3" />
    <rect x="0" y="30" width="50" height="25" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="3" />
    <rect x="0" y="60" width="50" height="25" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="3" />
    <rect x="0" y="90" width="50" height="25" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="3" />
    
    <text x="25" y="16" font-family="monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">objs[0]</text>
    <text x="25" y="46" font-family="monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">objs[1]</text>
    <text x="25" y="76" font-family="monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">objs[2]</text>
    <text x="25" y="106" font-family="monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">objs[3]</text>
  </g>

  <!-- Observers (Right) -->
  <!-- Observer 1 -->
  <g transform="translate(240, 30)" filter="url(#shadow)">
    <circle cx="25" cy="25" r="25" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="25" y="23" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="25" y="33" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Observer</text>
  </g>

  <!-- Observer 2 -->
  <g transform="translate(240, 90)" filter="url(#shadow)">
    <circle cx="25" cy="25" r="25" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="25" y="23" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="25" y="33" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Observer</text>
  </g>

  <!-- Observer 3 -->
  <g transform="translate(240, 150)" filter="url(#shadow)">
    <circle cx="25" cy="25" r="25" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="25" y="23" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="25" y="33" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Observer</text>
  </g>

  <!-- Array reference connections -->
  <g>
    <!-- objs[0] -> Obs 1 -->
    <path d="M 95,62 C 140,50 170,40 232,48" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="230,44 239,50 231,54" fill="#ea580c" />

    <!-- objs[1] -> Obs 2 -->
    <path d="M 95,92 C 140,92 170,100 232,108" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="231,104 239,110 230,113" fill="#ea580c" />

    <!-- objs[2] -> Obs 3 -->
    <path d="M 95,122 C 140,140 170,160 232,168" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="231,164 239,170 230,173" fill="#ea580c" />
  </g>
</svg>
