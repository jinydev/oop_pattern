<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Vertical Divider Line -->
  <line x1="220" y1="20" x2="220" y2="200" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,2" />

  <!-- Left/Right Headers -->
  <text x="110" y="35" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">외부 공개</text>
  <text x="360" y="35" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">내부 코드</text>

  <!-- Left Circle: 추상 클래스 -->
  <g filter="url(#shadow)">
    <circle cx="110" cy="110" r="32" fill="#ffffff" stroke="#0284c7" stroke-width="2.5" />
    <text x="110" y="107" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0284c7" text-anchor="middle">추상</text>
    <text x="110" y="120" font-family="'Inter', sans-serif" font-size="9" fill="#0284c7" text-anchor="middle">클래스</text>
  </g>

  <!-- Right Top Circle: 그룹1 -->
  <g filter="url(#shadow)">
    <circle cx="360" cy="75" r="28" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="360" y="79" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">그룹1</text>
  </g>

  <!-- Right Bottom Circle: 그룹1 -->
  <g filter="url(#shadow)">
    <circle cx="360" cy="155" r="28" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="360" y="159" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">그룹1</text>
  </g>

  <!-- Red Arrows crossing the boundary -->
  <g>
    <!-- Arrow to Top Circle -->
    <path d="M 142,110 L 220,110 L 220,75 L 328,75" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="328,71 336,75 328,79" fill="#ef4444" />

    <!-- Arrow to Bottom Circle -->
    <path d="M 142,110 L 220,110 L 220,155 L 328,155" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="328,151 336,155 328,159" fill="#ef4444" />
  </g>
</svg>
