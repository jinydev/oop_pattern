<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Step 1: Core Object -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="90" r="36" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <!-- Core representation: red square -->
    <rect x="68" y="78" width="24" height="24" rx="3" fill="#ef4444" />
  </g>
  <text x="80" y="150" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">기본 객체</text>

  <!-- Step 2: 1-Level Wrapped Object -->
  <g filter="url(#shadow)">
    <!-- Outer wrapping -->
    <circle cx="260" cy="90" r="36" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <!-- Inner object circle -->
    <circle cx="260" cy="90" r="22" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <!-- Core -->
    <rect x="251" y="81" width="18" height="18" rx="2" fill="#ef4444" />
  </g>
  <text x="260" y="150" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">1차 장식 객체</text>

  <!-- Step 3: 2-Level Wrapped Object -->
  <g filter="url(#shadow)">
    <!-- Outer wrapping 2 -->
    <circle cx="440" cy="90" r="36" fill="#ffffff" stroke="#ea580c" stroke-width="2.5" />
    <!-- Inner wrapping 1 -->
    <circle cx="440" cy="90" r="26" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Core circle -->
    <circle cx="440" cy="90" r="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
    <!-- Core -->
    <rect x="434" y="84" width="12" height="12" rx="1.5" fill="#ef4444" />
  </g>
  <text x="440" y="150" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">2차 장식 객체</text>

  <!-- Transition Arrows with "래핑 확장" label -->
  <g>
    <!-- Arrow 1 -> 2 -->
    <path d="M 135,90 L 205,90" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="205,86 213,90 205,94" fill="#64748b" />
    <text x="170" y="80" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#3b82f6" text-anchor="middle">래핑 확장</text>

    <!-- Arrow 2 -> 3 -->
    <path d="M 315,90 L 385,90" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="385,86 393,90 385,94" fill="#64748b" />
    <text x="350" y="80" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">래핑 확장</text>
  </g>
</svg>
