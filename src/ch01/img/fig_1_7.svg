<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Box: 개발 코드 -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="100" height="70" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="101" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">개발 코드</text>
  </g>

  <!-- Arrow from 개발 코드 to 생성 패턴 -->
  <g>
    <line x1="130" y1="95" x2="205" y2="95" stroke="#94a3b8" stroke-width="2" />
    <polygon points="205,90 215,95 205,100" fill="#94a3b8" />
  </g>

  <!-- Middle Box: 생성 패턴 -->
  <g filter="url(#shadow)">
    <rect x="215" y="60" width="100" height="70" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="265" y="101" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ea580c" text-anchor="middle">생성 패턴</text>
  </g>

  <!-- Dotted Arrow from 생성 패턴 to 객체 inside Memory -->
  <g>
    <line x1="315" y1="95" x2="410" y2="95" stroke="#ea580c" stroke-width="2" stroke-dasharray="4,2" />
    <polygon points="410,90 420,95 410,100" fill="#ea580c" />
    <!-- Label -->
    <rect x="340" y="70" width="50" height="18" rx="3" fill="#f1f5f9" />
    <text x="365" y="83" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>
  </g>

  <!-- Right Area: 메모리 Boundary -->
  <g>
    <!-- Boundary line -->
    <line x1="380" y1="40" x2="380" y2="160" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="440" y="32" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">메모리</text>

    <!-- Inside Memory: 객체 Box -->
    <g filter="url(#shadow)">
      <rect x="420" y="60" width="80" height="70" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
      <text x="460" y="100" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">객체</text>
    </g>
  </g>
</svg>
