<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Labels -->
  <text x="160" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">상속 확장 (is-a 관계)</text>

  <!-- Class B (Outer Box representing Class B extending/enclosing Class A) -->
  <g filter="url(#shadow)">
    <rect x="70" y="50" width="180" height="95" rx="6" fill="#ffffff" stroke="#475569" stroke-width="2" />
    <text x="85" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569">클래스 B</text>
  </g>

  <!-- Class A (Inner Box) -->
  <g filter="url(#shadow)">
    <rect x="100" y="85" width="120" height="42" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <text x="160" y="111" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">클래스 A</text>
  </g>
</svg>
