<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Horizontal dashed line separating Abstraction and Concrete subclasses -->
  <line x1="30" y1="125" x2="410" y2="125" stroke="#cbd5e1" stroke-dasharray="4,3" stroke-width="1.5" />
  
  <!-- Left Side labels -->
  <text x="40" y="75" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b">추상화</text>
  <text x="40" y="175" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b">하위 클래스</text>

  <!-- Top: Factory (Abstract Class / Interface) -->
  <g filter="url(#shadow)">
    <circle cx="220" cy="70" r="30" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
    <text x="220" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">Factory</text>
  </g>

  <!-- Bottom Left: Korea Factory -->
  <g filter="url(#shadow)">
    <circle cx="140" cy="170" r="32" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="140" y="167" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">Korea</text>
    <text x="140" y="179" font-family="'Inter', sans-serif" font-size="9" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- Bottom Right: State Factory -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="170" r="32" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="300" y="167" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">State</text>
    <text x="300" y="179" font-family="'Inter', sans-serif" font-size="9" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- Dotted arrows branching down -->
  <g>
    <path d="M 220,100 L 220,120 L 140,120 L 140,138" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="136,138 140,146 144,138" fill="#475569" />

    <path d="M 220,100 L 220,120 L 300,120 L 300,138" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="296,138 300,146 304,138" fill="#475569" />
  </g>
</svg>
