<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Proxy -->
  <g filter="url(#shadow)">
    <rect x="45" y="45" width="110" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="100" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">프록시 (Proxy)</text>
  </g>

  <!-- Real Subject (Object B) -->
  <g filter="url(#shadow)">
    <rect x="225" y="45" width="110" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="280" y="74" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">실체 객체 B</text>
  </g>

  <!-- Connection: Delegation Arrow -->
  <g>
    <path d="M 155,70 L 217,70" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="217,66 225,70 217,74" fill="#ea580c" />
    <text x="190" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">위임 (Delegation)</text>
  </g>
</svg>
