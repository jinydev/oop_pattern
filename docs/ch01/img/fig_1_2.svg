<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Title / Header -->
  <text x="310" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">그림 1-2 객체의 분리</text>

  <!-- Left Code Box: Hello (Original) -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="220" height="180" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <!-- Window header bar -->
    <path d="M 30,68 A 8,8 0 0 1 38,60 L 242,60 A 8,8 0 0 1 250,68 L 250,85 L 30,85 Z" fill="#f1f5f9" />
    <circle cx="45" cy="72" r="4" fill="#ef4444" />
    <circle cx="57" cy="72" r="4" fill="#eab308" />
    <circle cx="69" cy="72" r="4" fill="#22c55e" />
    <text x="90" y="77" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#64748b">class Hello</text>

    <!-- Code Text -->
    <g font-family="monospace" font-size="11" fill="#334155">
      <text x="50" y="110">class Hello</text>
      <text x="50" y="125">{</text>
      <text x="70" y="140" fill="#0284c7">public function greeting()</text>
      <text x="70" y="155">{</text>
      <!-- return statement -->
      <text x="90" y="180" font-weight="bold" fill="#0f172a">return "안녕하세요";</text>
      <text x="70" y="205">}</text>
      <text x="50" y="220">}</text>
    </g>

    <!-- Red Highlight Box around return statement -->
    <rect x="82" y="165" width="148" height="22" rx="4" fill="none" stroke="#ef4444" stroke-dasharray="4,2" stroke-width="1.5" />
  </g>

  <!-- Connecting Arrow with "별도의 클래스로 분리" -->
  <g>
    <path d="M 235,176 L 375,150" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <!-- Arrowhead -->
    <polygon points="372,145 385,148 375,155" fill="#ef4444" />
    
    <!-- Text badge -->
    <rect x="270" y="120" width="80" height="34" rx="4" fill="#fef2f2" stroke="#fee2e2" stroke-width="1" />
    <text x="310" y="133" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">별도의</text>
    <text x="310" y="147" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">클래스로 분리</text>
  </g>

  <!-- Right Code Box: Hello (Separated) -->
  <g filter="url(#shadow)">
    <rect x="370" y="60" width="220" height="180" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <!-- Window header bar -->
    <path d="M 370,68 A 8,8 0 0 1 378,60 L 582,60 A 8,8 0 0 1 590,68 L 590,85 L 370,85 Z" fill="#f1f5f9" />
    <circle cx="385" cy="72" r="4" fill="#ef4444" />
    <circle cx="397" cy="72" r="4" fill="#eab308" />
    <circle cx="409" cy="72" r="4" fill="#22c55e" />
    <text x="430" y="77" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#64748b">class Hello</text>

    <!-- Code Text -->
    <g font-family="monospace" font-size="11" fill="#334155">
      <text x="390" y="110">class Hello</text>
      <text x="390" y="125">{</text>
      <text x="410" y="140" fill="#0284c7">public function text()</text>
      <text x="410" y="155">{</text>
      <text x="430" y="180">return "안녕하세요";</text>
      <text x="410" y="205">}</text>
      <text x="390" y="220">}</text>
    </g>
  </g>
</svg>
