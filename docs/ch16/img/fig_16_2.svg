<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Data label (Left) -->
  <text x="45" y="94" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ea580c">데이터</text>
  <path d="M 90,90 L 142,90" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" />
  <polygon points="142,86 150,90 142,94" fill="#ea580c" />

  <!-- Inherited Class Box (Right) -->
  <g filter="url(#shadow)">
    <!-- Header: parent class product -->
    <path d="M 156,40 L 294,40 A 6,6 0 0 1 300,46 L 300,75 L 150,75 L 150,46 A 6,6 0 0 1 156,40 Z" fill="#475569" />
    <text x="225" y="61" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">product (부모)</text>

    <!-- Body: child class cart -->
    <path d="M 150,75 L 300,75 L 300,134 A 6,6 0 0 1 294,140 L 156,140 A 6,6 0 0 1 150,134 Z" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="225" y="105" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">cart (자식)</text>
    <text x="225" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(상속을 통해 확장)</text>
  </g>
</svg>
