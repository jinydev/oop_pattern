<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Flow Items -->
  <!-- 1: new 클래스 -->
  <text x="40" y="74" font-family="monospace" font-size="14" font-weight="bold" fill="#ef4444">new 클래스</text>

  <!-- 2: 클래스 (Middle Box) -->
  <g filter="url(#shadow)">
    <rect x="180" y="45" width="80" height="50" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="220" y="74" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- 3: 객체 (Right Box) -->
  <g filter="url(#shadow)">
    <rect x="330" y="45" width="80" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="370" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">객체</text>
    <text x="370" y="83" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(자원 소모)</text>
  </g>

  <!-- Connecting Arrows -->
  <g>
    <path d="M 125,70 L 172,70" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="172,66 180,70 172,74" fill="#475569" />

    <path d="M 260,70 L 322,70" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="322,66 330,70 322,74" fill="#475569" />
  </g>

  <!-- Under-Bracket & Label -->
  <path d="M 50,105 L 50,113 L 205,113 L 205,118 L 205,113 L 360,113 L 360,105" fill="none" stroke="#ef4444" stroke-width="1" />
  <text x="205" y="130" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">생성 시간, 자원을 사용함 (예: 1초)</text>
</svg>
