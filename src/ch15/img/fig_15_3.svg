<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Interface (Top) -->
  <g filter="url(#shadow)">
    <circle cx="190" cy="45" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="190" y="49" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">인터페이스</text>
  </g>

  <!-- Concrete Command Objects (Bottom) -->
  <!-- Command 1 -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="125" r="28" fill="#ffffff" stroke="#0f172a" stroke-width="2.0" />
    <text x="80" y="129" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#0f172a" text-anchor="middle">명령 객체 1</text>
  </g>

  <!-- Command 2 -->
  <g filter="url(#shadow)">
    <circle cx="190" cy="125" r="28" fill="#ffffff" stroke="#0f172a" stroke-width="2.0" />
    <text x="190" y="129" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#0f172a" text-anchor="middle">명령 객체 2</text>
  </g>

  <!-- Command 3 -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="125" r="28" fill="#ffffff" stroke="#0f172a" stroke-width="2.0" />
    <text x="300" y="129" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#0f172a" text-anchor="middle">명령 객체 3</text>
  </g>

  <!-- Inheritance / Implementation Arrows -->
  <g>
    <!-- Interface -> Command 1 -->
    <path d="M 166,59 L 104,111" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="101,107 100,115 107,112" fill="#64748b" />

    <!-- Interface -> Command 2 -->
    <path d="M 190,73 L 190,97" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="186,97 190,102 194,97" fill="#64748b" />

    <!-- Interface -> Command 3 -->
    <path d="M 214,59 L 276,111" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="273,112 280,115 279,107" fill="#64748b" />
  </g>
</svg>
