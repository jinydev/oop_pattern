<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top: Abstract Class -->
  <g transform="translate(150, 15)" filter="url(#shadow)">
    <rect width="160" height="95" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 154,0 A 6,6 0 0 1 160,6 L 160,25 L 0,25 Z" fill="#3b82f6" />
    <text x="80" y="16" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">추상 클래스</text>

    <!-- sandwich scaled -->
    <g transform="translate(45, 32) scale(0.5)">
      <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
      <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
    </g>
  </g>
  <text x="325" y="55" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="start">공통된 행위 로직</text>

  <!-- Bottom Left subclass -->
  <g transform="translate(20, 130)" filter="url(#shadow)">
    <rect width="180" height="90" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 174,0 A 6,6 0 0 1 180,6 L 180,25 L 0,25 Z" fill="#ea580c" />
    <text x="90" y="16" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">식빵 샌드위치 (하위 클래스)</text>

    <!-- methods -->
    <text x="90" y="45" font-family="monospace" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">Jam(): 딸기잼</text>
    <text x="90" y="65" font-family="monospace" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">Bread(): 식빵</text>
  </g>

  <!-- Bottom Right subclass -->
  <g transform="translate(260, 130)" filter="url(#shadow)">
    <rect width="180" height="90" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 174,0 A 6,6 0 0 1 180,6 L 180,25 L 0,25 Z" fill="#ea580c" />
    <text x="90" y="16" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">베이글 샌드위치 (하위 클래스)</text>

    <!-- methods -->
    <text x="90" y="45" font-family="monospace" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">Jam(): 사과잼</text>
    <text x="90" y="65" font-family="monospace" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">Bread(): 베이글</text>
  </g>

  <!-- Connective Lines -->
  <path d="M 230,110 L 110,130" fill="none" stroke="#64748b" stroke-width="1.2" />
  <polygon points="107,126 110,130 114,127" fill="#64748b" />
  
  <path d="M 230,110 L 350,130" fill="none" stroke="#64748b" stroke-width="1.2" />
  <polygon points="346,127 350,130 353,126" fill="#64748b" />

  <!-- Dotted labels (작은 변화) -->
  <!-- Left side -->
  <path d="M 15,175 L -10,175 L -10,175" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.2" />
  <text x="-15" y="178" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ef4444" text-anchor="end">작은 변화</text>
  
  <!-- Right side -->
  <path d="M 445,175 L 470,175" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.2" />
  <text x="475" y="178" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ef4444" text-anchor="start">작은 변화</text>
</svg>
