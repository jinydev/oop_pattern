<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Shared Hello Object (Left) -->
  <g filter="url(#shadow)">
    <rect x="35" y="65" width="110" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <text x="90" y="88" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">공유 객체</text>
    <text x="90" y="101" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">(Hello 인스턴스)</text>
  </g>

  <!-- Sharing Classes (Right) -->
  <!-- Korean -->
  <g filter="url(#shadow)">
    <rect x="235" y="30" width="110" height="42" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="290" y="48" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Korean 클래스</text>
    <text x="290" y="60" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">(참조/의존성)</text>
  </g>

  <!-- English -->
  <g filter="url(#shadow)">
    <rect x="235" y="108" width="110" height="42" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="290" y="126" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">English 클래스</text>
    <text x="290" y="138" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">(참조/의존성)</text>
  </g>

  <!-- Connectors showing single shared instance pointing to clients or client properties referring to it -->
  <!-- Let's draw arrows from client classes to the shared object indicating composition/reference -->
  <g>
    <!-- Korean -> Shared Hello -->
    <path d="M 235,51 L 180,51 L 145,75" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="143,71 138,79 147,77" fill="#3b82f6" />

    <!-- English -> Shared Hello -->
    <path d="M 235,129 L 180,129 L 145,105" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="147,103 138,101 143,109" fill="#3b82f6" />
  </g>

  <!-- Label in the middle: 공유 (Sharing) -->
  <rect x="160" y="80" width="40" height="18" rx="3" fill="#dbeafe" />
  <text x="180" y="92" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">공유</text>
</svg>
