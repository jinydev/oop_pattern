<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Single Complex Behavior (Left) -->
  <g transform="translate(40, 45)" filter="url(#shadow)">
    <circle cx="45" cy="45" r="45" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
    <text x="45" y="49" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">행동 (Behavior)</text>
  </g>

  <!-- Split Arrow -->
  <g>
    <path d="M 160,90 L 205,90" fill="none" stroke="#ea580c" stroke-width="3" />
    <polygon points="203,84 213,90 203,96" fill="#ea580c" />
  </g>

  <!-- Distributed Objects (Right) -->
  <g transform="translate(240, 25)" filter="url(#shadow)">
    <!-- Obj 1 -->
    <circle cx="20" cy="20" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="20" y="23" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체</text>

    <!-- Obj 2 -->
    <circle cx="80" cy="20" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="80" y="23" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체</text>

    <!-- Obj 3 -->
    <circle cx="20" cy="80" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="20" y="83" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체</text>

    <!-- Obj 4 -->
    <circle cx="80" cy="80" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="80" y="83" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체</text>
  </g>
</svg>
