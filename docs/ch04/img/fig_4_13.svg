<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- TOP HIERARCHY -->
  <!-- Factory -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="45" r="26" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
    <text x="300" y="49" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0f172a" text-anchor="middle">Factory</text>
  </g>

  <!-- Korea Factory -->
  <g filter="url(#shadow)">
    <circle cx="210" cy="115" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="210" y="112" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">Korea</text>
    <text x="210" y="122" font-family="'Inter', sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- State Factory -->
  <g filter="url(#shadow)">
    <circle cx="390" cy="115" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="390" y="112" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">State</text>
    <text x="390" y="122" font-family="'Inter', sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- Top arrows -->
  <g>
    <path d="M 280,62 L 235,98" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="232,95 231,101 237,99" fill="#64748b" />

    <path d="M 320,62 L 365,98" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="363,99 369,101 368,95" fill="#64748b" />
  </g>

  <!-- Korea Factory Methods -->
  <g>
    <!-- Method Box 1: createTire() -->
    <rect x="130" y="170" width="70" height="22" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="165" y="184" font-family="monospace" font-size="9" font-weight="bold" fill="#94a3b8" text-anchor="middle">createTire()</text>

    <!-- Method Box 2: createDoor() -->
    <rect x="235" y="170" width="70" height="22" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="270" y="184" font-family="monospace" font-size="9" font-weight="bold" fill="#94a3b8" text-anchor="middle">createDoor()</text>

    <!-- Arrows from Korea Factory to method boxes -->
    <path d="M 190,135 L 170,170" fill="none" stroke="#e2e8f0" stroke-width="1.2" />
    <polygon points="167,166 166,172 172,170" fill="#e2e8f0" />

    <path d="M 230,135 L 250,170" fill="none" stroke="#e2e8f0" stroke-width="1.2" />
    <polygon points="248,170 254,172 253,166" fill="#e2e8f0" />
  </g>

  <!-- State Factory Methods -->
  <g>
    <!-- Method Box 1: createTire() -->
    <rect x="330" y="170" width="70" height="22" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="365" y="184" font-family="monospace" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">createTire()</text>

    <!-- Method Box 2: createDoor() -->
    <rect x="435" y="170" width="70" height="22" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="470" y="184" font-family="monospace" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">createDoor()</text>

    <!-- Arrows from State Factory to method boxes -->
    <path d="M 370,135 L 350,170" fill="none" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="348,166 346,172 352,170" fill="#94a3b8" />

    <path d="M 410,135 L 430,170" fill="none" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="428,170 434,172 433,166" fill="#94a3b8" />
  </g>


  <!-- BOTTOM LEFT SUBTREE: tire product -->
  <!-- tire product -->
  <g filter="url(#shadow)">
    <circle cx="165" cy="245" r="26" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
    <text x="165" y="242" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#0f172a" text-anchor="middle">tire</text>
    <text x="165" y="252" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">product</text>
  </g>

  <!-- Korea tire Factory -->
  <g filter="url(#shadow)">
    <circle cx="95" cy="315" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="95" y="306" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">Korea</text>
    <text x="95" y="316" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">tire</text>
    <text x="95" y="326" font-family="'Inter', sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- State tire Factory -->
  <g filter="url(#shadow)">
    <circle cx="235" cy="315" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="235" y="306" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">State</text>
    <text x="235" y="316" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">tire</text>
    <text x="235" y="326" font-family="'Inter', sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- Bottom Left arrows -->
  <g>
    <path d="M 145,260 L 115,295" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="112,292 111,298 117,296" fill="#64748b" />

    <path d="M 185,260 L 215,295" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="213,296 219,298 218,292" fill="#64748b" />
  </g>


  <!-- BOTTOM RIGHT SUBTREE: Door product -->
  <!-- Door product -->
  <g filter="url(#shadow)">
    <circle cx="435" cy="245" r="26" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
    <text x="435" y="242" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#0f172a" text-anchor="middle">Door</text>
    <text x="435" y="252" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">product</text>
  </g>

  <!-- Korea Door Factory -->
  <g filter="url(#shadow)">
    <circle cx="365" cy="315" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="365" y="306" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">Korea</text>
    <text x="365" y="316" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">Door</text>
    <text x="365" y="326" font-family="'Inter', sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- State Door Factory -->
  <g filter="url(#shadow)">
    <circle cx="505" cy="315" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="505" y="306" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">State</text>
    <text x="505" y="316" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">Door</text>
    <text x="505" y="326" font-family="'Inter', sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Factory</text>
  </g>

  <!-- Bottom Right arrows -->
  <g>
    <path d="M 415,260 L 385,295" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="382,292 381,298 387,296" fill="#64748b" />

    <path d="M 455,260 L 485,295" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="483,296 489,298 488,292" fill="#64748b" />
  </g>


  <!-- DOTTED AND SOLID FLOW LINES -->
  <g>
    <!-- Korea Factory: createTire() -> Korea tire Factory (Dotted/Greyed out) -->
    <path d="M 165,192 L 165,210 L 95,210 L 95,287" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" />
    <polygon points="92,287 95,293 98,287" fill="#94a3b8" />

    <!-- Korea Factory: createDoor() -> Korea Door Factory (Dotted/Greyed out) -->
    <path d="M 270,192 L 270,210 L 365,210 L 365,287" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" />
    <polygon points="362,287 365,293 368,287" fill="#94a3b8" />

    <!-- State Factory: createTire() -> State tire Factory (Solid Red) -->
    <path d="M 365,192 L 365,225 L 235,225 L 235,282" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="231,282 235,290 239,282" fill="#ef4444" />

    <!-- State Factory: createDoor() -> State Door Factory (Solid Red) -->
    <path d="M 470,192 L 470,225 L 505,225 L 505,282" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="501,282 505,290 509,282" fill="#ef4444" />
  </g>
</svg>
