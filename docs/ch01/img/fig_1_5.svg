<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Box: Korean (Injected object) -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="120" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="100" y="60" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">Korean</text>
  </g>

  <!-- Box: Hello (Receiving object) -->
  <g filter="url(#shadow)">
    <rect x="180" y="100" width="160" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="260" y="141" font-family="'Inter', sans-serif" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">Hello</text>
  </g>

  <!-- Injection Arrow -->
  <g>
    <!-- Right-down path arrow -->
    <path d="M 160,55 L 260,55 L 260,90" fill="none" stroke="#ef4444" stroke-width="2.5" />
    <polygon points="255,90 260,100 265,90" fill="#ef4444" />
  </g>
</svg>
