<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top Region: Non-Terminal Expression -->
  <g transform="translate(15, 15)">
    <rect width="250" height="135" fill="none" stroke="#3b82f6" stroke-dasharray="3,2" stroke-width="1.5" />
    
    <!-- Circles representation -->
    <!-- Top circle -->
    <circle cx="125" cy="30" r="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Left circle -->
    <circle cx="70" cy="90" r="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Right circle -->
    <circle cx="180" cy="90" r="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />

    <!-- Connecting lines inside non-terminal -->
    <line x1="113" y1="41" x2="82" y2="79" stroke="#94a3b8" stroke-width="1.2" />
    <line x1="137" y1="41" x2="168" y2="79" stroke="#94a3b8" stroke-width="1.2" />
  </g>
  
  <!-- Non-terminal Label -->
  <g transform="translate(280, 50)">
    <text x="0" y="15" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a">비종료 기호</text>
    <text x="0" y="30" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6">(Non-Terminal Expression)</text>
  </g>

  <!-- Bottom Region: Terminal Expression -->
  <g transform="translate(15, 165)">
    <rect width="250" height="75" fill="none" stroke="#ea580c" stroke-dasharray="3,2" stroke-width="1.5" />

    <!-- Rectangles representation -->
    <rect x="25" y="20" width="30" height="30" rx="3" fill="#fffedd" stroke="#f59e0b" stroke-width="1.5" />
    <rect x="85" y="20" width="30" height="30" rx="3" fill="#fffedd" stroke="#f59e0b" stroke-width="1.5" />
    <rect x="135" y="20" width="30" height="30" rx="3" fill="#fffedd" stroke="#f59e0b" stroke-width="1.5" />
    <rect x="195" y="20" width="30" height="30" rx="3" fill="#fffedd" stroke="#f59e0b" stroke-width="1.5" />
  </g>

  <!-- Terminal Label -->
  <g transform="translate(280, 180)">
    <text x="0" y="15" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#9a3412">종료 기호</text>
    <text x="0" y="30" font-family="'Inter', sans-serif" font-size="9" fill="#ea580c">(Terminal Expression)</text>
  </g>

  <!-- Tree connections from circles to rectangles -->
  <!-- Left circle to rectangle 1 & 2 -->
  <line x1="85" y1="105" x2="55" y2="185" stroke="#94a3b8" stroke-dasharray="2,2" stroke-width="1.2" />
  <line x1="85" y1="105" x2="115" y2="185" stroke="#94a3b8" stroke-dasharray="2,2" stroke-width="1.2" />

  <!-- Right circle to rectangle 3 & 4 -->
  <line x1="195" y1="105" x2="165" y2="185" stroke="#94a3b8" stroke-dasharray="2,2" stroke-width="1.2" />
  <line x1="195" y1="105" x2="225" y2="185" stroke="#94a3b8" stroke-dasharray="2,2" stroke-width="1.2" />
</svg>
