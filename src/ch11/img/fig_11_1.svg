<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Main System Labels (Top) -->
  <text x="35" y="35" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b">메인 시스템</text>

  <!-- Three client modules at the top -->
  <g filter="url(#shadow)">
    <rect x="70" y="50" width="80" height="36" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="110" y="72" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="50" width="80" height="36" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="260" y="72" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="50" width="80" height="36" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="410" y="72" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Sub-System Area (Bottom Box) -->
  <rect x="30" y="115" width="460" height="145" rx="8" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4" />
  <text x="45" y="135" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#94a3b8">서브 시스템</text>

  <!-- Nested messy sub-system modules -->
  <!-- Sub-mod 1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="145" width="60" height="28" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2" />
    <text x="110" y="162" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Sub-mod 2 -->
  <g filter="url(#shadow)">
    <rect x="180" y="145" width="60" height="28" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2" />
    <text x="210" y="162" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Sub-mod 3 -->
  <g filter="url(#shadow)">
    <rect x="280" y="145" width="60" height="28" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2" />
    <text x="310" y="162" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Sub-mod 4 -->
  <g filter="url(#shadow)">
    <rect x="380" y="145" width="60" height="28" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2" />
    <text x="410" y="162" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Sub-mod 5 -->
  <g filter="url(#shadow)">
    <rect x="130" y="210" width="60" height="28" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2" />
    <text x="160" y="227" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Sub-mod 6 -->
  <g filter="url(#shadow)">
    <rect x="330" y="210" width="60" height="28" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2" />
    <text x="360" y="227" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">모듈</text>
  </g>

  <!-- Complex interconnected arrows -->
  <g>
    <!-- Clients to sub-system modules (messy crossing) -->
    <path d="M 110,86 L 110,140" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="107,140 110,145 113,140" fill="#ef4444" />

    <path d="M 260,86 L 210,140" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="207,137 207,144 214,141" fill="#ef4444" />

    <path d="M 410,86 L 310,140" fill="none" stroke="#ef4444" stroke-width="1.2" />
    <polygon points="307,137 307,144 314,141" fill="#ef4444" />

    <!-- Internal connections -->
    <path d="M 140,159 L 175,159" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="175,157 179,159 175,161" fill="#64748b" />

    <path d="M 240,159 L 275,159" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="275,157 279,159 275,161" fill="#64748b" />

    <path d="M 340,159 L 375,159" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="375,157 379,159 375,161" fill="#64748b" />

    <path d="M 110,173 L 140,210" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="137,211 143,213 142,207" fill="#64748b" />

    <path d="M 190,224 L 325,224" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="325,222 329,224 325,226" fill="#64748b" />

    <path d="M 380,210 L 400,178" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="397,177 397,174 403,178" fill="#64748b" />
  </g>
</svg>
