<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: 개발 코드 -->
  <text x="50" y="125" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#475569">개발 코드</text>

  <!-- Middle Large Box: 생성 패턴 -->
  <g filter="url(#shadow)">
    <rect x="200" y="40" width="200" height="150" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="205" y="32" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#64748b">생성 패턴</text>
  </g>

  <!-- Inside: 오류 검사 Diamond -->
  <g filter="url(#shadow)">
    <polygon points="300,80 340,120 300,160 260,120" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5" />
    <text x="300" y="116" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#991b1b" text-anchor="middle">오류</text>
    <text x="300" y="132" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#991b1b" text-anchor="middle">검사</text>
  </g>

  <!-- Left to Diamond: ① 생성 요청 -->
  <g>
    <path d="M 120,120 L 252,120" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="252,116 260,120 252,124" fill="#ef4444" />
    <text x="180" y="106" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">① 생성 요청</text>
  </g>

  <!-- Down from Diamond: 객체를 생성할 수 없습니다. -->
  <g>
    <path d="M 300,160 L 300,195" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="296,195 300,202 304,195" fill="#64748b" />
    
    <!-- Error msg box -->
    <rect x="210" y="205" width="180" height="24" rx="4" fill="#fef2f2" stroke="#fee2e2" stroke-width="1" />
    <text x="300" y="221" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">객체를 생성할 수 없습니다.</text>
  </g>

  <!-- Far Right Box: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="440" y="100" width="80" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="480" y="125" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Right from Diamond: new Arrow -->
  <g>
    <path d="M 340,120 L 432,120" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="432,116 440,120 432,124" fill="#22c55e" />
    <text x="390" y="110" font-family="monospace" font-size="11" font-weight="bold" fill="#16a34a" text-anchor="middle">new</text>
  </g>
</svg>
