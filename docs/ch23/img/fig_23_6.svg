<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top Left: Client Object (Dashed) -->
  <g transform="translate(30, 30)">
    <rect width="100" height="50" rx="6" fill="none" stroke="#64748b" stroke-dasharray="3,2" stroke-width="1.5" />
    <text x="50" y="29" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">객체 (Client)</text>
  </g>

  <!-- Dotted indicator line from Client to Interface -->
  <path d="M 130,55 L 205,55" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.2" />
  <polygon points="205,52 211,55 205,58" fill="#ef4444" />
  
  <text x="167" y="45" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ef4444" text-anchor="middle">호환성을 위한 약속된 정보</text>

  <!-- Middle: Interface (Weapon) -->
  <g transform="translate(220, 30)" filter="url(#shadow)">
    <rect width="120" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 114,0 A 6,6 0 0 1 120,6 L 120,20 L 0,20 Z" fill="#3b82f6" />
    <text x="60" y="13" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">인터페이스 (Interface)</text>
    <text x="60" y="38" font-family="monospace" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">&lt;&lt;Weapon&gt;&gt;</text>
  </g>

  <!-- Bottom: Concrete Algorithms (Knife, ..., Gun) -->
  <!-- Knife (Left) -->
  <g transform="translate(60, 130)" filter="url(#shadow)">
    <rect width="80" height="40" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="40" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#c2410c" text-anchor="middle">칼 (Knife)</text>
  </g>
  <!-- Arrow to interface -->
  <path d="M 100,130 L 220,75" fill="none" stroke="#ea580c" stroke-width="1.2" />
  <polygon points="214,73 223,73 218,81" fill="#ea580c" />

  <!-- Dotted Middle ... -->
  <g transform="translate(190, 130)">
    <rect width="80" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-dasharray="3,2" stroke-width="1" />
    <text x="40" y="24" font-family="'Inter', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">...</text>
  </g>
  <!-- Arrow to interface -->
  <path d="M 230,130 L 255,85" fill="none" stroke="#64748b" stroke-width="1.2" />
  <polygon points="250,83 258,80 256,88" fill="#64748b" />

  <!-- Gun (Right) -->
  <g transform="translate(320, 130)" filter="url(#shadow)">
    <rect width="80" height="40" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="40" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#c2410c" text-anchor="middle">총 (Gun)</text>
  </g>
  <!-- Arrow to interface -->
  <path d="M 360,130 L 310,83" fill="none" stroke="#ea580c" stroke-width="1.2" />
  <polygon points="313,80 305,79 308,86" fill="#ea580c" />
</svg>
