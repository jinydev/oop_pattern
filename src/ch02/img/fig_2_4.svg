<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Box: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="40" y="55" width="120" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="100" y="96" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Two new arrows pointing to the same single A, B 객체 -->
  <g>
    <!-- Top new arrow -->
    <path d="M 160,75 L 250,75 M 250,75 L 250,85 L 265,85" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="263,80 270,85 263,90" fill="#94a3b8" />
    <text x="210" y="68" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>

    <!-- Bottom new arrow -->
    <path d="M 160,105 L 250,105 M 250,105 L 250,95 L 265,95" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="263,90 270,95 263,100" fill="#94a3b8" />
    <text x="210" y="120" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>
  </g>

  <!-- Single shared Object: A, B 객체 -->
  <g transform="translate(280, 55)" filter="url(#shadow)">
    <polygon points="30,0 80,0 65,15 15,15" fill="#fb923c" />
    <polygon points="15,15 65,15 65,55 15,55" fill="#ea580c" />
    <polygon points="65,15 80,0 80,40 65,55" fill="#c2410c" />
    <text x="40" y="40" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">A, B 객체</text>
  </g>

  <!-- Object C sharing info -->
  <g transform="translate(420, 55)" filter="url(#shadow)">
    <polygon points="30,0 80,0 65,15 15,15" fill="#fb923c" />
    <polygon points="15,15 65,15 65,55 15,55" fill="#ea580c" />
    <polygon points="65,15 80,0 80,40 65,55" fill="#c2410c" />
    <text x="40" y="40" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">C 객체</text>
  </g>

  <!-- Dotted arrow from C to A, B 객체 with label 정보 공유 -->
  <g>
    <path d="M 430,90 L 370,90" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3" />
    <polygon points="372,86 362,90 372,94" fill="#22c55e" />

    <!-- Label -->
    <rect x="375" y="105" width="60" height="18" rx="3" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1" />
    <text x="405" y="118" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#15803d" text-anchor="middle">정보 공유</text>
  </g>
</svg>
