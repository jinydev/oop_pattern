<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Hello Class Box -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 90,35 L 230,35 A 6,6 0 0 1 236,41 L 236,55 L 84,55 L 84,41 A 6,6 0 0 1 90,35 Z" fill="#475569" />
    <text x="160" y="48" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Hello 클래스</text>

    <!-- Body -->
    <path d="M 84,55 L 236,55 L 236,99 A 6,6 0 0 1 230,105 L 90,105 A 6,6 0 0 1 84,99 Z" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="160" y="80" font-family="monospace" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">greeting()</text>
  </g>
</svg>
