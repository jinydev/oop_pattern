<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- 1: Real Object (Top Left) -->
  <g filter="url(#shadow)">
    <circle cx="90" cy="45" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="90" y="49" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">실체 객체</text>
  </g>

  <!-- 2: Command Object (Bottom Left) -->
  <g filter="url(#shadow)">
    <circle cx="90" cy="135" r="28" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="90" y="139" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">명령 객체</text>
  </g>

  <!-- Dependency Injection Connection (vertical) -->
  <g>
    <path d="M 90,73 L 90,107" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="86,107 90,112 94,107" fill="#3b82f6" />
    <text x="135" y="96" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" text-anchor="middle">매개변수 의존성 주입</text>
  </g>

  <!-- 3: Queue Store (Middle 3D box representation) -->
  <g filter="url(#shadow)">
    <!-- 3D Cube shape using polygon -->
    <polygon points="230,80 270,70 310,80 310,120 270,130 230,120" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="230,80 270,90 310,80" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <path d="M 270,90 L 270,130" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <text x="270" y="112" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">큐 (Queue)</text>
  </g>

  <!-- Arrow to Queue -->
  <g>
    <path d="M 118,135 L 170,135 L 225,115" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="222,111 230,113 226,119" fill="#64748b" />
    <text x="165" y="125" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#64748b" text-anchor="middle">큐 저장</text>
  </g>

  <!-- 4: Execution (Right orange box) -->
  <g filter="url(#shadow)">
    <rect x="380" y="80" width="90" height="40" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
    <text x="425" y="104" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">실행 (Execute)</text>
  </g>

  <!-- Arrow from Queue to Execution -->
  <g>
    <path d="M 315,100 L 372,100" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="372,96 380,100 372,104" fill="#ea580c" />
  </g>
</svg>
