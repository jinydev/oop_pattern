<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 280" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- 1: Client Request (Left) -->
  <text x="35" y="134" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0f172a">객체 생성 요청</text>
  <path d="M 120,130 L 172,130" fill="none" stroke="#475569" stroke-width="1.5" />
  <polygon points="172,126 180,130 172,134" fill="#475569" />

  <!-- 2: Registry Pool Check (Middle Box) -->
  <g filter="url(#shadow)">
    <rect x="180" y="95" width="140" height="70" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="250" y="125" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">공유 저장소</text>
    <text x="250" y="140" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">(Instance Pool)</text>
  </g>

  <!-- Decision path from pool: check if exists -->
  <!-- path 1: Exists (Up and Right) -->
  <path d="M 250,95 L 250,55 L 362,55" fill="none" stroke="#10b981" stroke-width="1.5" />
  <polygon points="362,51 370,55 362,59" fill="#10b981" />
  <text x="295" y="47" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">이미 존재함 (Reuse)</text>

  <!-- Existing Object Box (Top Right) -->
  <g filter="url(#shadow)">
    <rect x="370" y="35" width="130" height="40" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" />
    <text x="435" y="59" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#065f46" text-anchor="middle">기존 객체 반환</text>
  </g>

  <!-- path 2: Doesn't Exist (Down and Right) -->
  <path d="M 250,165 L 250,205 L 362,205" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
  <polygon points="362,201 370,205 362,209" fill="#ef4444" />
  <text x="295" y="197" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">존재하지 않음 (Create)</text>

  <!-- Create Object Box (Bottom Right) -->
  <g filter="url(#shadow)">
    <rect x="370" y="185" width="130" height="40" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" />
    <text x="435" y="209" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">신규 객체 생성</text>
  </g>

  <!-- Arrow to store newly created object back into pool -->
  <path d="M 435,185 L 435,145 L 330,145" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,3" />
  <polygon points="330,149 322,145 330,141" fill="#64748b" />
  <text x="390" y="138" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">저장소 등록</text>

  <!-- Return Flow to Client -->
  <!-- Return Arrow from top-right -->
  <path d="M 500,55 L 520,55 L 520,250 L 80,250 L 80,165" fill="none" stroke="#64748b" stroke-width="1.2" />
  <polygon points="84,165 80,157 76,165" fill="#64748b" />

  <!-- Return Arrow from bottom-right -->
  <path d="M 500,205 L 520,205" fill="none" stroke="#64748b" stroke-width="1.2" />
</svg>
