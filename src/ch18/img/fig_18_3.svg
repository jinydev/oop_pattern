<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Subject (Left) -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="100" r="35" fill="#ea580c" stroke="#c2410c" stroke-width="2" />
    <text x="80" y="98" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">주체</text>
    <text x="80" y="112" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffedd5" text-anchor="middle">(Subject)</text>
  </g>

  <!-- Observers (Right) -->
  <!-- Observer 1 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="40" r="22" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="270" y="38" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="270" y="48" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Observer</text>
  </g>

  <!-- Observer 2 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="100" r="22" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="270" y="98" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="270" y="108" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Observer</text>
  </g>

  <!-- Observer 3 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="160" r="22" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="270" y="158" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="270" y="168" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Observer</text>
  </g>

  <!-- Push Arrows (from Subject to Observers) -->
  <g>
    <!-- Subj -> Obs 1 -->
    <path d="M 113,85 C 160,70 190,60 241,48" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="238,44 247,46 240,52" fill="#ef4444" />

    <!-- Subj -> Obs 2 -->
    <path d="M 115,100 L 238,100" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="238,96 246,100 238,104" fill="#ef4444" />

    <!-- Subj -> Obs 3 -->
    <path d="M 113,115 C 160,130 190,140 241,152" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="240,148 247,154 238,156" fill="#ef4444" />
    
    <text x="175" y="125" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">업데이트 통보 (Notify)</text>
  </g>
</svg>
