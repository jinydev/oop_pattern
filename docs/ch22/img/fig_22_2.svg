<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Sandwich Diagram (Center) -->
  <g transform="translate(140, 25)">
    <!-- Bottom Bread (Layer 1) -->
    <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
    
    <!-- Middle Filling (Layer 2) -->
    <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />

    <!-- Top Bread (Layer 3) -->
    <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
  </g>

  <!-- Step Labels & Pointers -->
  <!-- Step 1 (Bottom Bread) -->
  <g transform="translate(15, 145)">
    <rect width="115" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2" />
    <text x="57" y="19" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">1단계: 빵을 준비합니다.</text>
    
    <path d="M 115,15 L 145,15 L 145,120 M 145,120 L 160,120" fill="none" stroke="#2563eb" stroke-width="1.2" />
    <polygon points="160,117 167,120 160,123" fill="#2563eb" />
  </g>

  <!-- Step 2 (Middle Filling) -->
  <g transform="translate(290, 80)">
    <rect width="115" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2" />
    <text x="57" y="19" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">2단계: 속재료를 올려줍니다.</text>
    
    <path d="M 0,15 L -45,15" fill="none" stroke="#2563eb" stroke-width="1.2" />
    <polygon points="-45,12 -52,15 -45,18" fill="#2563eb" />
  </g>

  <!-- Step 3 (Top Bread) -->
  <g transform="translate(15, 30)">
    <rect width="125" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2" />
    <text x="62" y="19" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">3단계: 다시 빵을 올려줍니다.</text>
    
    <path d="M 125,15 L 165,15 L 165,40 L 180,40" fill="none" stroke="#2563eb" stroke-width="1.2" />
    <polygon points="180,37 187,40 180,43" fill="#2563eb" />
  </g>
</svg>
