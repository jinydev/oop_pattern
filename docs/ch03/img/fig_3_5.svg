<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: 개발 코드 -->
  <text x="50" y="110" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#475569">개발 코드</text>

  <!-- Middle Box: 생성 패턴 -->
  <g filter="url(#shadow)">
    <rect x="230" y="80" width="130" height="60" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="235" y="72" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#64748b">생성 패턴</text>
    <text x="295" y="115" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">...</text>
  </g>

  <!-- Dotted red arrow: 개발 코드 -> 생성 패턴 -->
  <g>
    <path d="M 120,110 L 220,110" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" />
    <polygon points="220,106 228,110 220,114" fill="#ef4444" />
    <text x="170" y="96" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">객체 생성 요청</text>
  </g>

  <!-- Right: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="410" y="125" width="80" height="35" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="450" y="147" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Arrow from 생성 패턴 to 클래스 -->
  <g>
    <path d="M 330,140 L 330,142 L 402,142" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="402,138 410,142 402,146" fill="#94a3b8" />
  </g>

  <!-- Speech Bubble: 내가 알아서 만들어줄 테니 신경 쓰지 마! -->
  <g filter="url(#shadow)" transform="translate(320, 20)">
    <!-- Speech Bubble shape pointing left-down -->
    <path d="M 10,40 L 0,47 L 5,35 C 2,32 0,28 0,25 C 0,11 35,0 80,0 C 125,0 160,11 160,25 C 160,39 125,50 80,50 C 50,50 25,46 10,40 Z" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" />
    <text x="80" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">내가 알아서 만들어줄 테니</text>
    <text x="80" y="37" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">신경 쓰지 마!</text>
  </g>
</svg>
