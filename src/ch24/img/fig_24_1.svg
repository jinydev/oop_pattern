<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Operator Node (Top) -->
  <g transform="translate(160, 45)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <text x="0" y="5" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a" text-anchor="middle">+</text>
  </g>

  <!-- Operand A (Left) -->
  <g transform="translate(50, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="60" height="40" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="30" y="24" font-family="monospace" font-size="12" font-weight="bold" fill="#c2410c" text-anchor="middle">A</text>
  </g>

  <!-- Operand B (Right) -->
  <g transform="translate(210, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="60" height="40" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="30" y="24" font-family="monospace" font-size="12" font-weight="bold" fill="#c2410c" text-anchor="middle">B</text>
  </g>

  <!-- Lines -->
  <!-- Left path -->
  <line x1="140" y1="60" x2="80" y2="130" stroke="#64748b" stroke-width="1.5" />
  
  <!-- Right path -->
  <line x1="180" y1="60" x2="240" y2="130" stroke="#64748b" stroke-width="1.5" />
</svg>
