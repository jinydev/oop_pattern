<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Subject (Left) -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="100" r="35" fill="#ea580c" stroke="#c2410c" stroke-width="2" />
    <text x="80" y="98" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">주체</text>
    <text x="80" y="112" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffedd5" text-anchor="middle">(Subject)</text>
  </g>

  <!-- Observers (Right) -->
  <!-- Observer 1 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="50" r="25" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="270" y="48" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="270" y="58" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">(Observer)</text>
  </g>

  <!-- Observer 2 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="150" r="25" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="270" y="148" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="270" y="158" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#e2e8f0" text-anchor="middle">(Observer)</text>
  </g>

  <!-- Dependency Arrows (Observers pointing to Subject) -->
  <g>
    <!-- Obs 1 -> Subj -->
    <path d="M 245,50 C 190,50 160,75 115,92" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="117,88 107,95 119,96" fill="#ef4444" />
    <text x="180" y="62" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">의존성</text>

    <!-- Obs 2 -> Subj -->
    <path d="M 245,150 C 190,150 160,125 115,108" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="119,104 107,105 117,112" fill="#ef4444" />
    <text x="180" y="142" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">의존성</text>
  </g>
</svg>
