<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Object 1 -->
  <g filter="url(#shadow)">
    <rect x="30" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="75" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">객체1</text>
  </g>

  <!-- Object 2 -->
  <g filter="url(#shadow)">
    <rect x="185" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="230" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">객체2</text>
  </g>

  <!-- Object 3 -->
  <g filter="url(#shadow)">
    <rect x="340" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="385" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">객체3</text>
  </g>

  <!-- Arrows and Dependency Labels -->
  <g>
    <!-- Arrow 1 -> 2 -->
    <path d="M 120,70 L 175,70" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="175,66 183,70 175,74" fill="#ef4444" />
    <text x="152" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">의존①</text>

    <!-- Arrow 2 -> 3 -->
    <path d="M 275,70 L 330,70" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="330,66 338,70 330,74" fill="#ef4444" />
    <text x="307" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">의존②</text>
  </g>
</svg>
