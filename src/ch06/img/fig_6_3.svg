<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Variables -->
  <g filter="url(#shadow)">
    <circle cx="100" cy="45" r="22" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="100" y="49" font-family="monospace" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">$obj</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="260" cy="45" r="22" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="260" y="49" font-family="monospace" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">$obj2</text>
  </g>

  <!-- Arrow: Shallow Copy -->
  <g>
    <path d="M 130,45 L 230,45" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="230,41 238,45 230,49" fill="#ef4444" />
    <text x="180" y="35" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">얕은 복사</text>
  </g>

  <!-- Object in Memory -->
  <g filter="url(#shadow)">
    <rect x="130" y="105" width="100" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="180" y="127" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">[객체]</text>
  </g>

  <!-- Both point to the single object -->
  <g>
    <path d="M 100,68 L 100,88 L 155,88 L 155,101" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="152,101 155,105 158,101" fill="#64748b" />

    <path d="M 260,68 L 260,88 L 205,88 L 205,101" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="202,101 205,105 208,101" fill="#64748b" />
  </g>
</svg>
