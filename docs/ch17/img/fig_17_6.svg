<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Handler (Left) -->
  <g transform="translate(30, 40)" filter="url(#shadow)">
    <rect width="110" height="120" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="55" y="22" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">핸들러 (Handler)</text>
    
    <!-- Redundant Dispatcher Diamond inside Handler -->
    <polygon points="55,40 80,60 55,80 30,60" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" />
    <text x="55" y="63" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">분기</text>
    <text x="55" y="105" font-family="'Inter', sans-serif" font-size="7" font-weight="bold" fill="#ef4444" text-anchor="middle">조건 처리 이중 존재</text>
  </g>

  <!-- Real Objects (Right) -->
  <!-- Real Object 1 -->
  <g transform="translate(250, 25)" filter="url(#shadow)">
    <rect width="160" height="60" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체 1 (ordered)</text>
    <!-- Internal condition check diamond -->
    <polygon points="80,28 100,42 80,56 60,42" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="80" y="45" font-family="'Inter', sans-serif" font-size="7" font-weight="bold" fill="#1e3a8a" text-anchor="middle">조건 검사</text>
  </g>

  <!-- Real Object 2 -->
  <g transform="translate(250, 115)" filter="url(#shadow)">
    <rect width="160" height="60" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체 2 (cancel)</text>
    <!-- Internal condition check diamond -->
    <polygon points="80,28 100,42 80,56 60,42" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="80" y="45" font-family="'Inter', sans-serif" font-size="7" font-weight="bold" fill="#1e3a8a" text-anchor="middle">조건 검사</text>
  </g>

  <!-- Routing arrows with explanation -->
  <g>
    <!-- Handler -> Real Object 1 -->
    <path d="M 125,100 C 170,100 180,55 242,55" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="239,51 248,55 240,59" fill="#64748b" />

    <!-- Handler -> Real Object 2 -->
    <path d="M 125,100 C 170,100 180,145 242,145" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="240,141 248,145 239,149" fill="#64748b" />

    <text x="400" y="102" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#2563eb">조건 처리를</text>
    <text x="400" y="115" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#2563eb">실제 객체로 이동</text>
  </g>
</svg>
