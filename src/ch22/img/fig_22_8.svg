<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: Superclass (Abstract Class) -->
  <g transform="translate(15, 20)" filter="url(#shadow)">
    <rect width="180" height="170" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 172,0 A 8,8 0 0 1 180,8 L 180,25 L 0,25 Z" fill="#3b82f6" />
    <text x="90" y="16" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">상위 클래스 (추상 클래스)</text>

    <!-- make() -->
    <g transform="translate(15, 35)">
      <rect width="150" height="26" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" />
      <text x="75" y="17" font-family="monospace" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">make()</text>
    </g>

    <!-- Jam() -->
    <g transform="translate(100, 80)">
      <rect width="65" height="26" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="2,2" stroke-width="1" />
      <text x="32" y="17" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Jam()</text>
    </g>

    <!-- Bread() -->
    <g transform="translate(15, 120)">
      <rect width="65" height="26" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="2,2" stroke-width="1" />
      <text x="32" y="17" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Bread()</text>
    </g>

    <!-- Internal Arrow connections -->
    <path d="M 90,61 Q 132,61 132,80" fill="none" stroke="#2563eb" stroke-width="1" />
    <polygon points="129,80 132,85 135,80" fill="#2563eb" />

    <path d="M 90,61 Q 47,61 47,120" fill="none" stroke="#2563eb" stroke-width="1" />
    <polygon points="44,120 47,125 50,120" fill="#2563eb" />
  </g>

  <!-- Left boundary indicator text -->
  <g transform="translate(15, 10)">
    <text x="-5" y="0" font-family="'Inter', sans-serif" font-size="8" fill="#475569" text-anchor="start">외형적인 뼈대 (공통적인 기능)</text>
  </g>

  <!-- Middle inheritance and implement label arrows -->
  <g>
    <!-- 상속 -->
    <path d="M 200,60 L 260,60" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="260,57 266,60 260,63" fill="#64748b" />
    <text x="230" y="52" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#475569" text-anchor="middle">상속</text>

    <!-- 구현 -->
    <path d="M 200,125 L 260,125" fill="none" stroke="#ea580c" stroke-dasharray="3,2" stroke-width="1.2" />
    <polygon points="260,122 266,125 260,128" fill="#ea580c" />
    <text x="230" y="117" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#c2410c" text-anchor="middle">구현</text>
  </g>

  <!-- Right: Subclass (Concrete Class) -->
  <g transform="translate(270, 20)" filter="url(#shadow)">
    <rect width="170" height="170" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 162,0 A 8,8 0 0 1 170,8 L 170,25 L 0,25 Z" fill="#ea580c" />
    <text x="85" y="16" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">하위 클래스</text>

    <!-- Jam() implemented -->
    <g transform="translate(90, 80)">
      <rect width="65" height="26" rx="3" fill="#fffedd" stroke="#f59e0b" stroke-width="1.2" />
      <text x="32" y="17" font-family="monospace" font-size="9" font-weight="bold" fill="#92400e" text-anchor="middle">Jam()</text>
    </g>

    <!-- Bread() implemented -->
    <g transform="translate(15, 120)">
      <rect width="65" height="26" rx="3" fill="#fffedd" stroke="#f59e0b" stroke-width="1.2" />
      <text x="32" y="17" font-family="monospace" font-size="9" font-weight="bold" fill="#92400e" text-anchor="middle">Bread()</text>
    </g>
  </g>
</svg>
