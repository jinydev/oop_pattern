<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Client (A) Calling surrogate -->
  <text x="35" y="74" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0f172a">호출자 (Client)</text>

  <!-- Proxy / Surrogate (Object A) -->
  <g filter="url(#shadow)">
    <rect x="145" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="190" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">대리자</text>
    <text x="190" y="83" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">(객체 A)</text>
  </g>

  <!-- Real Subject (Object B) -->
  <g filter="url(#shadow)">
    <rect x="275" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="320" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">실체 객체</text>
    <text x="320" y="83" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">(객체 B)</text>
  </g>

  <!-- Connection Arrows -->
  <g>
    <!-- client -> proxy -->
    <path d="M 115,70 L 137,70" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="137,66 145,70 137,74" fill="#475569" />

    <!-- proxy -> real -->
    <path d="M 235,70 L 267,70" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="267,66 275,70 267,74" fill="#ef4444" />
    <text x="251" y="60" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ef4444" text-anchor="middle">위임 호출</text>
  </g>
</svg>
