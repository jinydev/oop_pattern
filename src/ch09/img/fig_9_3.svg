<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Computer Class Box (Left) -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 46,50 L 174,50 A 6,6 0 0 1 180,56 L 180,70 L 40,70 L 40,56 A 6,6 0 0 1 46,50 Z" fill="#0f172a" />
    <text x="110" y="63" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Computer 클래스</text>

    <!-- Body -->
    <path d="M 40,70 L 180,70 L 180,174 A 6,6 0 0 1 174,180 L 46,180 A 6,6 0 0 1 40,174 Z" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
    <text x="110" y="95" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Monitor</text>
    <text x="110" y="125" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Disk</text>
    <text x="110" y="155" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Memory</text>
  </g>

  <!-- Middle circles representing immediate classes -->
  <!-- Monitor Class -->
  <g filter="url(#shadow)">
    <circle cx="280" cy="70" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="280" y="67" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Monitor</text>
    <text x="280" y="78" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Disk Class -->
  <g filter="url(#shadow)">
    <circle cx="340" cy="125" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="122" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Disk</text>
    <text x="340" y="133" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Memory Class -->
  <g filter="url(#shadow)">
    <circle cx="280" cy="180" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="280" y="177" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Memory</text>
    <text x="280" y="188" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Sub-classes under Monitor (Vertical Expansion, shown on the right) -->
  <g filter="url(#shadow)">
    <circle cx="430" cy="45" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="430" y="48" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="430" cy="95" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="430" y="98" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Connection Arrows -->
  <g>
    <!-- class -> properties -->
    <path d="M 252,70 L 190,90" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="191,94 182,92 189,86" fill="#ea580c" />

    <path d="M 312,125 L 182,125" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="190,125 182,125 190,121" fill="#ea580c" />

    <path d="M 252,180 L 190,160" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="189,164 182,158 191,156" fill="#ea580c" />

    <!-- Sub-classes pointing to Monitor -->
    <!-- Top sub-class -->
    <path d="M 407,52 L 307,67" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="308,71 299,68 307,63" fill="#3b82f6" />

    <!-- Bottom sub-class -->
    <path d="M 407,88 L 307,73" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="307,77 299,72 308,69" fill="#3b82f6" />
  </g>
</svg>
