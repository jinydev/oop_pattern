<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <text x="230" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">문제 해결 전략 (Ver 0.1 vs Ver 1.0)</text>

  <!-- Left: Ver 0.1 flow -->
  <g transform="translate(30, 30)">
    <!-- 코드1 -->
    <rect x="25" y="5" width="70" height="24" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
    <text x="60" y="20" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">코드1</text>

    <!-- arrow -->
    <path d="M 60,29 L 60,38" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="58,38 60,42 62,38" fill="#64748b" />

    <!-- Dashed block -->
    <rect x="0" y="42" width="120" height="75" rx="4" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.2" />
    <text x="60" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">엉성한 프로그램</text>
    <text x="60" y="75" font-family="'Inter', sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">동작 속도 느림</text>
    <text x="60" y="95" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">Ver 0.1</text>

    <!-- arrow -->
    <path d="M 60,117 L 60,126" fill="none" stroke="#64748b" stroke-width="1" />
    <polygon points="58,126 60,130 62,126" fill="#64748b" />

    <!-- 코드5 -->
    <rect x="25" y="126" width="70" height="24" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
    <text x="60" y="141" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">코드5</text>
  </g>

  <!-- Connective technical debt arrow -->
  <g transform="translate(165, 95)">
    <path d="M 0,0 L 110,0" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.5" />
    <polygon points="110,-4 118,0 110,4" fill="#ef4444" />
    
    <text x="55" y="-18" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">개발 부채</text>
    <text x="55" y="-6" font-family="'Inter', sans-serif" font-size="8" fill="#991b1b" text-anchor="middle">(알고리즘 변경)</text>
  </g>

  <!-- Right: Ver 1.0 improved block -->
  <g transform="translate(300, 72)" filter="url(#shadow)">
    <rect width="130" height="75" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2" />
    <text x="65" y="24" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#065f46" text-anchor="middle">기능 개선</text>
    <text x="65" y="40" font-family="'Inter', sans-serif" font-size="9" fill="#047857" text-anchor="middle">빠른 속도 보장</text>
    <text x="65" y="60" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Ver 1.0</text>
  </g>
</svg>
