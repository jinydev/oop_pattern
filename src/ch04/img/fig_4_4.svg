<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top Circle: 추상 클래스 -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="55" r="30" fill="#ffffff" stroke="#0284c7" stroke-width="2.5" />
    <text x="200" y="52" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0284c7" text-anchor="middle">추상</text>
    <text x="200" y="65" font-family="'Inter', sans-serif" font-size="9" fill="#0284c7" text-anchor="middle">클래스</text>
  </g>

  <!-- Branching arrows from 추상 클래스 to 그룹1, 그룹2 -->
  <g>
    <!-- M 200,85 -> split to Left (110) & Right (290) -->
    <path d="M 200,85 L 200,105 L 110,105 L 110,122" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="106,122 110,130 114,122" fill="#ef4444" />

    <path d="M 200,85 L 200,105 L 290,105 L 290,122" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="286,122 290,130 294,122" fill="#ef4444" />

    <!-- extends label -->
    <rect x="175" y="96" width="50" height="16" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="0.5" />
    <text x="200" y="108" font-family="monospace" font-size="9" font-weight="bold" fill="#64748b" text-anchor="middle">extends</text>
  </g>

  <!-- Bottom Left Circle: 그룹1 -->
  <g filter="url(#shadow)">
    <circle cx="110" cy="150" r="28" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="110" y="154" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">그룹1</text>
  </g>

  <!-- Bottom Right Circle: 그룹2 -->
  <g filter="url(#shadow)">
    <circle cx="290" cy="150" r="28" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="290" y="154" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">그룹2</text>
  </g>
</svg>
