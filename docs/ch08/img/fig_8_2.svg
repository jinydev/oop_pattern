<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Hello Class Box -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 70,30 L 250,30 A 6,6 0 0 1 256,36 L 256,50 L 64,50 L 64,36 A 6,6 0 0 1 70,30 Z" fill="#475569" />
    <text x="160" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Hello 클래스</text>

    <!-- Body -->
    <path d="M 64,50 L 256,50 L 256,144 A 6,6 0 0 1 250,150 L 70,150 A 6,6 0 0 1 64,144 Z" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="160" y="75" font-family="monospace" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">greeting(인자)</text>
  </g>

  <!-- Branching paths inside the box -->
  <g>
    <!-- Branch Left (Korean) -->
    <path d="M 140,85 L 110,110" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="107,110 108,116 113,113" fill="#ef4444" />
    <text x="95" y="130" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">Korean</text>

    <!-- Branch Right (기타) -->
    <path d="M 180,85 L 210,110" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="207,113 212,116 213,110" fill="#64748b" />
    <text x="225" y="130" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#64748b" text-anchor="middle">기타</text>
  </g>
</svg>
