<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Center Box: getInstance() -->
  <g filter="url(#shadow)">
    <rect x="220" y="45" width="160" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="225" y="37" font-family="monospace" font-size="12" font-weight="bold" fill="#64748b">getInstance()</text>
    
    <rect x="240" y="75" width="120" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="300" y="97" font-family="monospace" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">new self()</text>
  </g>

  <!-- Left: 개발 코드 (First caller) -->
  <text x="50" y="100" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#334155">개발 코드</text>
  
  <!-- Right: 개발 코드 (Second caller) -->
  <text x="500" y="100" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#334155">개발 코드</text>

  <!-- Bottom: 참조체 -->
  <g filter="url(#shadow)">
    <rect x="250" y="175" width="100" height="30" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1" />
    <text x="300" y="194" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">참조체</text>
  </g>

  <!-- Flow Arrows -->
  <g>
    <!-- 1. 객체 요청 -->
    <path d="M 110,95 L 210,95" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="210,91 218,95 210,99" fill="#94a3b8" />
    <text x="160" y="86" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">① 객체 요청</text>

    <!-- 2. 참조체 객체 저장 -->
    <path d="M 300,110 L 300,165" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="296,165 300,172 304,165" fill="#ea580c" />
    <text x="312" y="150" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c">② 참조체 객체 저장</text>

    <!-- 3. 반환 -->
    <path d="M 250,190 L 80,190 L 80,115" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="76,115 80,107 84,115" fill="#64748b" />
    <text x="165" y="182" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">③ 반환</text>

    <!-- 4. 객체 요청 (from right) -->
    <path d="M 490,95 L 390,95" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="390,99 382,95 390,91" fill="#94a3b8" />
    <text x="440" y="86" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">④ 객체 요청</text>

    <!-- 5. 두 번째 요청 시 객체 반환 -->
    <path d="M 350,190 L 520,190 L 520,115" fill="none" stroke="#22c55e" stroke-width="1.5" />
    <polygon points="516,115 520,107 524,115" fill="#22c55e" />
    <text x="435" y="155" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="middle">⑤ 두 번째 요청 시,</text>
    <text x="435" y="170" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="middle">참조체에 저장된</text>
    <text x="435" y="185" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="middle">객체 반환</text>
  </g>
</svg>
