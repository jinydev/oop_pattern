<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Modification Closed (Left) -->
  <g filter="url(#shadow)">
    <rect x="40" y="35" width="100" height="90" rx="8" fill="#f1f5f9" stroke="#0f172a" stroke-width="2.5" />
    <!-- Padlock icon -->
    <path d="M 90,62 L 90,75 L 100,75 L 100,62 C 100,56 90,56 90,62 Z M 85,75 L 105,75 L 105,95 L 85,95 Z" fill="#0f172a" />
    <circle cx="95" cy="82" r="2" fill="#ffffff" />
    <path d="M 95,84 L 95,90" stroke="#ffffff" stroke-width="1.5" />
    <text x="90" y="115" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0f172a" text-anchor="middle">수정 불가</text>
  </g>

  <!-- Open for Extension (Middle & Right) -->
  <!-- Extension 1 -->
  <g filter="url(#shadow)">
    <rect x="180" y="35" width="100" height="90" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="230" y="80" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">확장 가능</text>
    <text x="230" y="95" font-family="'Inter', sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">(신규 기능 A)</text>
  </g>

  <!-- Extension 2 -->
  <g filter="url(#shadow)">
    <rect x="310" y="35" width="100" height="90" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="360" y="80" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">확장 가능</text>
    <text x="360" y="95" font-family="'Inter', sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">(신규 기능 B)</text>
  </g>

  <!-- Connection / Flow indication -->
  <g>
    <path d="M 148,80 L 172,80" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="172,76 180,80 172,84" fill="#64748b" />
  </g>
</svg>
