<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Computer Class Box (Left) -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 46,30 L 174,30 A 6,6 0 0 1 180,36 L 180,50 L 40,50 L 40,36 A 6,6 0 0 1 46,30 Z" fill="#0f172a" />
    <text x="110" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Computer 클래스</text>

    <!-- Body -->
    <path d="M 40,50 L 180,50 L 180,94 A 6,6 0 0 1 174,100 L 46,100 A 6,6 0 0 1 40,94 Z" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
    <text x="110" y="75" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Monitor</text>
  </g>

  <!-- Monitor Class Box (Right) -->
  <g filter="url(#shadow)">
    <rect x="250" y="45" width="90" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="295" y="69" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Monitor 클래스</text>
  </g>

  <!-- Connection Arrow: Monitor -> $Monitor -->
  <g>
    <path d="M 250,65 L 190,65" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="190,69 182,65 190,61" fill="#ea580c" />
    <text x="215" y="55" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ea580c" text-anchor="middle">의존/소유</text>
  </g>
</svg>
