<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top Left Circle: 부장 -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="65" r="30" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="80" y="69" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ea580c" text-anchor="middle">부장</text>
  </g>

  <!-- Top Middle Circle: 과장 -->
  <g filter="url(#shadow)">
    <circle cx="230" cy="65" r="30" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <text x="230" y="69" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0284c7" text-anchor="middle">과장</text>
  </g>

  <!-- Top Right Circle: 사원 -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="65" r="30" fill="#ffffff" stroke="#64748b" stroke-width="1.5" />
    <text x="380" y="69" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">사원</text>
  </g>

  <!-- Bottom Left Circle: 사원 -->
  <g filter="url(#shadow)">
    <circle cx="230" cy="175" r="30" fill="#ffffff" stroke="#64748b" stroke-width="1.5" />
    <text x="230" y="179" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">사원</text>
  </g>

  <!-- Bottom Right Circle: 사원 -->
  <g filter="url(#shadow)">
    <circle cx="330" cy="140" r="30" fill="#ffffff" stroke="#64748b" stroke-width="1.5" />
    <text x="330" y="144" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">사원</text>
  </g>

  <!-- Arrows -->
  <g>
    <!-- Arrow: 부장 -> 과장 -->
    <path d="M 110,65 L 190,65" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" />
    <polygon points="190,61 198,65 190,69" fill="#94a3b8" />

    <!-- Arrow: 과장 -> 사원 (Right) -->
    <path d="M 260,65 L 340,65" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" />
    <polygon points="340,61 348,65 340,69" fill="#94a3b8" />

    <!-- Arrow: 과장 -> 사원 (Bottom) -->
    <path d="M 230,95 L 230,135" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" />
    <polygon points="226,135 230,143 234,135" fill="#94a3b8" />

    <!-- Arrow: 과장 -> 사원 (Diagonal) -->
    <path d="M 252,85 L 305,123" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" />
    <polygon points="302,126 311,127 307,119" fill="#94a3b8" />
  </g>
</svg>
