<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Array Indices (Top) -->
  <!-- Index 0 -->
  <g filter="url(#shadow)">
    <rect x="40" y="25" width="80" height="40" rx="4" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="80" y="49" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Index 0</text>
  </g>

  <!-- Index 1 -->
  <g filter="url(#shadow)">
    <rect x="145" y="25" width="80" height="40" rx="4" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="185" y="49" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Index 1</text>
  </g>

  <!-- Index 2 -->
  <g filter="url(#shadow)">
    <rect x="250" y="25" width="80" height="40" rx="4" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="290" y="49" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Index 2</text>
  </g>

  <!-- Index 3 -->
  <g filter="url(#shadow)">
    <rect x="355" y="25" width="80" height="40" rx="4" fill="#64748b" stroke="#475569" stroke-width="1.5" />
    <text x="395" y="49" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Index 3</text>
  </g>

  <!-- Objects (Bottom) -->
  <!-- Object Apple -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="125" r="24" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="80" y="129" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">Apple</text>
  </g>

  <!-- Object Banana -->
  <g filter="url(#shadow)">
    <circle cx="185" cy="125" r="24" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="185" y="129" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">Banana</text>
  </g>

  <!-- Object Berry -->
  <g filter="url(#shadow)">
    <circle cx="290" cy="125" r="24" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="290" y="129" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">Berry</text>
  </g>

  <!-- Object Grape -->
  <g filter="url(#shadow)">
    <circle cx="395" cy="125" r="24" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="395" y="129" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">Grape</text>
  </g>

  <!-- Mapping Arrows -->
  <g>
    <path d="M 80,101 L 80,72" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="77,72 80,67 83,72" fill="#64748b" />

    <path d="M 185,101 L 185,72" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="182,72 185,67 188,72" fill="#64748b" />

    <path d="M 290,101 L 290,72" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="287,72 290,67 293,72" fill="#64748b" />

    <path d="M 395,101 L 395,72" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="392,72 395,67 398,72" fill="#64748b" />
  </g>
</svg>
