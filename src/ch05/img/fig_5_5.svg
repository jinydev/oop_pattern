<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Text: 개발 코드 -->
  <text x="35" y="94" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#0f172a">개발 코드</text>

  <!-- Middle: 빌더 (Builder) -->
  <g filter="url(#shadow)">
    <rect x="150" y="55" width="90" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="195" y="82" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">빌더</text>
    <text x="195" y="98" font-family="'Inter', sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">(Builder)</text>
  </g>

  <!-- Right-Middle: [알고리즘] -->
  <g filter="url(#shadow)">
    <rect x="290" y="65" width="80" height="40" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <text x="330" y="89" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">알고리즘</text>
  </g>

  <!-- Right: 클래스 들 -->
  <text x="420" y="89" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#475569">클래스 들</text>

  <!-- Arrows -->
  <g>
    <!-- Arrow 1: 개발 코드 -> 빌더 -->
    <path d="M 100,90 L 142,90" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="142,86 150,90 142,94" fill="#ef4444" />
    <!-- Labeled details below/above arrow -->
    <text x="120" y="70" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">① 복합 객체</text>
    <text x="120" y="83" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">생성 요청</text>

    <!-- Arrow 2: 빌더 -> 알고리즘 -->
    <path d="M 240,85 L 282,85" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="282,81 290,85 282,89" fill="#3b82f6" />

    <!-- Arrow 3: 알고리즘 -> 클래스들 (Dotted) -->
    <path d="M 370,85 L 412,85" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="412,81 420,85 412,89" fill="#64748b" />
  </g>
</svg>
