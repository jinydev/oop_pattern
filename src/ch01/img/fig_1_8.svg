<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Hello Class Box -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="180" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="35" y="48" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#475569">Hello</text>
    <text x="45" y="94" font-family="monospace" font-size="11" fill="#334155">$ko = Factory::<tspan font-weight="bold" fill="#0f172a">getInstance()</tspan>;</text>
    <text x="45" y="116" font-family="'Inter', sans-serif" font-size="11" fill="#64748b">// 팩토리 호출</text>
    <!-- Highlight dashed box around getInstance() -->
    <rect x="119" y="80" width="82" height="20" rx="3" fill="none" stroke="#ef4444" stroke-dasharray="3,2" stroke-width="1.5" />
  </g>

  <!-- Factory Class Box -->
  <g filter="url(#shadow)">
    <rect x="310" y="60" width="130" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="315" y="48" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#475569">Factory</text>
    <text x="330" y="106" font-family="monospace" font-size="12" fill="#0f172a">new Korean;</text>
  </g>

  <!-- Korean Class Box -->
  <g filter="url(#shadow)">
    <rect x="490" y="60" width="80" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="495" y="48" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#475569">Korean</text>
    <text x="525" y="106" font-family="monospace" font-size="13" fill="#64748b">...</text>
  </g>

  <!-- Arrow between Hello and Factory -->
  <g>
    <line x1="210" y1="95" x2="300" y2="95" stroke="#ef4444" stroke-width="2" />
    <polygon points="300,90 310,95 300,100" fill="#ef4444" />
    <text x="260" y="83" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">객체 요청</text>
    <text x="260" y="112" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">느슨한 관계</text>
  </g>

  <!-- Dotted Arrow from Factory to Korean -->
  <g>
    <!-- Curve line showing creation flow -->
    <path d="M 375,140 C 375,185 530,185 530,148" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="525,152 530,140 535,152" fill="#ef4444" />
    
    <!-- Text badge for creation label -->
    <rect x="410" y="170" width="90" height="20" rx="3" fill="#fef2f2" stroke="#fee2e2" stroke-width="1" />
    <text x="455" y="184" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">실체 객체 생성</text>
  </g>
</svg>
