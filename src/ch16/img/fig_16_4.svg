<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Title / Label -->
  <text x="190" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">Visitable</text>

  <!-- accept caller (Left) -->
  <text x="45" y="104" font-family="monospace" font-size="12" font-weight="bold" fill="#ea580c">accept()</text>
  <path d="M 100,100 L 152,100" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" />
  <polygon points="152,96 160,100 152,104" fill="#ea580c" />

  <!-- Visitable container (Right) -->
  <g filter="url(#shadow)">
    <!-- parent class product -->
    <path d="M 166,50 L 304,50 A 6,6 0 0 1 310,56 L 310,85 L 160,85 L 160,56 A 6,6 0 0 1 166,50 Z" fill="#475569" />
    <text x="235" y="71" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">product</text>

    <!-- child class cart -->
    <path d="M 160,85 L 310,85 L 310,144 A 6,6 0 0 1 304,150 L 166,150 A 6,6 0 0 1 160,144 Z" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="235" y="115" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">cart</text>
    <text x="235" y="132" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">(방문자 허용 인터페이스 구현)</text>
  </g>
</svg>
