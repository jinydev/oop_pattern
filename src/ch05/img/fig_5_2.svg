<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Complex Object (Outer Box representing Complex Object enclosing references) -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="160" height="140" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <text x="120" y="65" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">복합 객체</text>
  </g>

  <!-- Inner Reference Places -->
  <rect x="60" y="85" width="120" height="30" rx="4" fill="none" stroke="#cbd5e1" stroke-dasharray="3,3" />
  <rect x="60" y="130" width="120" height="30" rx="4" fill="none" stroke="#cbd5e1" stroke-dasharray="3,3" />

  <!-- Target Objects on the right -->
  <!-- Object 1 -->
  <g filter="url(#shadow)">
    <rect x="300" y="75" width="110" height="40" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="355" y="99" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">객체</text>
  </g>

  <!-- Object 2 -->
  <g filter="url(#shadow)">
    <rect x="300" y="135" width="110" height="40" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="355" y="159" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">객체</text>
  </g>

  <!-- Dependency/Reference Arrows -->
  <g>
    <!-- Arrow 1 -->
    <path d="M 180,100 L 290,100" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="290,96 298,100 290,104" fill="#ef4444" />
    <text x="240" y="90" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">의존 관계</text>

    <!-- Arrow 2 -->
    <path d="M 180,145 L 290,145" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="290,141 298,145 290,149" fill="#ef4444" />
    <text x="240" y="135" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">의존 관계</text>
  </g>
</svg>
