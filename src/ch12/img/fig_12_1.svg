<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Subclasses (Top) -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="110" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="95" y="54" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Korean 클래스</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="230" y="30" width="110" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="285" y="54" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">English 클래스</text>
  </g>

  <!-- Inheritance Redundancy (Bottom) -->
  <g filter="url(#shadow)">
    <rect x="85" y="110" width="210" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="190" y="130" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">Hello (부모 클래스)</text>
    <text x="190" y="143" font-family="'Inter', sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">중복 할당된 코드/자원 영역</text>
  </g>

  <!-- Inheritance Arrows -->
  <g>
    <!-- Korean -> Hello -->
    <path d="M 95,70 L 95,95 L 180,95 L 180,105" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="176,105 180,109 184,105" fill="#64748b" />

    <!-- English -> Hello -->
    <path d="M 285,70 L 285,95 L 200,95 L 200,105" fill="none" stroke="#64748b" stroke-width="1.2" />
    <polygon points="196,105 200,109 204,105" fill="#64748b" />
  </g>
</svg>
