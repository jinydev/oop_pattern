<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- 1: 클래스 (Adaptee/Original Class) -->
  <g filter="url(#shadow)">
    <rect x="40" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="85" y="74" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ea580c" text-anchor="middle">클래스</text>
  </g>

  <!-- 2: 어댑터 (Adapter) -->
  <g filter="url(#shadow)">
    <rect x="185" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="230" y="74" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">어댑터</text>
  </g>

  <!-- 3: 타깃 (Target Interface) -->
  <g filter="url(#shadow)">
    <rect x="330" y="45" width="90" height="50" rx="6" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
    <text x="375" y="74" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">타깃</text>
  </g>

  <!-- Arrows (Target pointing to Adapter pointing to Class/Adaptee) -->
  <g>
    <!-- target -> adapter -->
    <path d="M 330,70 L 283,70" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="283,74 275,70 283,66" fill="#64748b" />
    <text x="302" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">구성/참조</text>

    <!-- adapter -> class -->
    <path d="M 185,70 L 138,70" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="138,74 130,70 138,66" fill="#64748b" />
    <text x="157" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">구성/참조</text>
  </g>
</svg>
