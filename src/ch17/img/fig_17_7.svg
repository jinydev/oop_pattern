<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Handler (Left) -->
  <g transform="translate(30, 45)" filter="url(#shadow)">
    <rect width="90" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="45" y="35" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">핸들러</text>
  </g>

  <!-- Concrete Chain Receivers (Right) -->
  <!-- Real Object 1 (ordered) -->
  <g transform="translate(190, 20)" filter="url(#shadow)">
    <rect width="150" height="70" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="75" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체 1 (ordered)</text>
    <!-- Internal condition check diamond -->
    <polygon points="75,32 95,45 75,58 55,45" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="75" y="48" font-family="'Inter', sans-serif" font-size="7" font-weight="bold" fill="#1e3a8a" text-anchor="middle">조건</text>
  </g>

  <!-- Real Object 2 (cancel) -->
  <g transform="translate(190, 130)" filter="url(#shadow)">
    <rect width="150" height="70" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="75" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체 2 (cancel)</text>
    <!-- Internal condition check diamond -->
    <polygon points="75,32 95,45 75,58 55,45" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="75" y="48" font-family="'Inter', sans-serif" font-size="7" font-weight="bold" fill="#1e3a8a" text-anchor="middle">조건</text>
  </g>

  <!-- Connection lines -->
  <g>
    <!-- Handler -> Real Object 1 -->
    <path d="M 120,75 L 182,75" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="182,71 190,75 182,79" fill="#64748b" />

    <!-- Chain linking (Real Object 1 -> Real Object 2) -->
    <path d="M 265,90 L 265,122" fill="none" stroke="#ef4444" stroke-width="2" />
    <polygon points="261,122 265,130 269,122" fill="#ef4444" />
    <text x="315" y="111" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">사슬 연결 (Next)</text>
  </g>
</svg>
