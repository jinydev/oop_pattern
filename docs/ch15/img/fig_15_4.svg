<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Real Object (Top) -->
  <g filter="url(#shadow)">
    <circle cx="190" cy="45" r="28" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="190" y="49" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체</text>
  </g>

  <!-- Command Object (Bottom) -->
  <g filter="url(#shadow)">
    <circle cx="190" cy="135" r="28" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <rect x="180" y="125" width="20" height="20" rx="3" fill="#ea580c" />
    <text x="190" y="115" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#0f172a" text-anchor="middle">명령 객체</text>
    <text x="190" y="137" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">리시버</text>
  </g>

  <!-- Connection: Dependency Injection (vertical) -->
  <g>
    <path d="M 190,73 L 190,107" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="186,107 190,112 194,107" fill="#3b82f6" />
    <text x="240" y="96" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" text-anchor="middle">매개변수 의존성 주입</text>
  </g>
</svg>
