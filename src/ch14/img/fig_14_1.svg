<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Four boxes representing array values -->
  <!-- Box 0 -->
  <g filter="url(#shadow)">
    <rect x="40" y="35" width="80" height="50" rx="6" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
    <text x="80" y="65" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">apple</text>
  </g>

  <!-- Box 1 -->
  <g filter="url(#shadow)">
    <rect x="145" y="35" width="80" height="50" rx="6" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
    <text x="185" y="65" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">banana</text>
  </g>

  <!-- Box 2 -->
  <g filter="url(#shadow)">
    <rect x="250" y="35" width="80" height="50" rx="6" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
    <text x="290" y="65" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">berry</text>
  </g>

  <!-- Box 3 -->
  <g filter="url(#shadow)">
    <rect x="355" y="35" width="80" height="50" rx="6" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
    <text x="395" y="65" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">grape</text>
  </g>
</svg>
