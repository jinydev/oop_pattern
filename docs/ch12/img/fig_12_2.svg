<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Subclasses (Top) -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="110" height="42" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="95" y="48" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Korean 클래스</text>
    <text x="95" y="60" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">($_hello)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="230" y="30" width="110" height="42" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="285" y="48" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">English 클래스</text>
    <text x="285" y="60" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">($_hello)</text>
  </g>

  <!-- Redundant creation of Hello instances (Bottom) -->
  <!-- Hello 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="115" width="110" height="36" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" />
    <text x="95" y="137" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#b91c1c" text-anchor="middle">new Hello()</text>
  </g>

  <!-- Hello 2 -->
  <g filter="url(#shadow)">
    <rect x="230" y="115" width="110" height="36" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" />
    <text x="285" y="137" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#b91c1c" text-anchor="middle">new Hello()</text>
  </g>

  <!-- Connectors showing duplicate creation -->
  <g>
    <!-- Korean -> new Hello -->
    <path d="M 95,72 L 95,110" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="91,110 95,115 99,110" fill="#ef4444" />

    <!-- English -> new Hello -->
    <path d="M 285,72 L 285,110" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="281,110 285,115 289,110" fill="#ef4444" />
  </g>

  <!-- Label: 의존 객체 중복 생성 -->
  <rect x="120" y="85" width="140" height="18" rx="3" fill="#fee2e2" />
  <text x="190" y="97" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">의존 객체 중복 생성</text>
</svg>
