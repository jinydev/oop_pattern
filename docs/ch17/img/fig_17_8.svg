<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Condition Diamond (Top Left) -->
  <g filter="url(#shadow)">
    <polygon points="120,30 200,65 120,100 40,65" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <text x="120" y="69" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태값 일치?</text>
  </g>

  <!-- YES branch: Action Box (Top Right) -->
  <g transform="translate(270, 45)" filter="url(#shadow)">
    <rect width="160" height="40" rx="4" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5" />
    <text x="80" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">이벤트 행동을 처리합니다.</text>
  </g>

  <!-- NO branch: Next Object forward (Bottom Left) -->
  <g transform="translate(40, 135)" filter="url(#shadow)">
    <rect width="160" height="40" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="80" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">다음 사슬 객체 호출</text>
  </g>

  <!-- Action explanation (Bottom Right) -->
  <text x="270" y="159" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#64748b">다음 사슬과 연결된 객체를</text>
  <text x="270" y="172" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#64748b">호출하여 위임합니다.</text>

  <!-- Interaction Flow lines -->
  <g>
    <!-- Diamond -> YES branch -->
    <path d="M 200,65 L 262,65" fill="none" stroke="#10b981" stroke-width="1.5" />
    <polygon points="262,61 270,65 262,69" fill="#10b981" />
    <text x="235" y="55" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#10b981" text-anchor="middle">yes</text>

    <!-- Diamond -> NO branch -->
    <path d="M 120,100 L 120,127" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="116,127 120,135 124,127" fill="#ef4444" />
    <text x="135" y="120" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">no</text>

    <!-- Forward arrow to text description -->
    <path d="M 208,155 L 255,155" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2" />
    <polygon points="255,151 263,155 255,159" fill="#64748b" />
  </g>
</svg>
