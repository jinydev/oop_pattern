<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Box: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="40" y="60" width="120" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="100" y="106" font-family="'Inter', sans-serif" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Arrow with labels -->
  <g>
    <line x1="160" y1="100" x2="270" y2="100" stroke="#94a3b8" stroke-width="2" />
    <polygon points="270,95 280,100 270,105" fill="#94a3b8" />
    
    <text x="220" y="86" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">인스턴스화</text>
    <rect x="200" y="110" width="40" height="18" rx="3" fill="#f1f5f9" />
    <text x="220" y="123" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>
  </g>

  <!-- Right Block: 3D Object (Isometric) -->
  <g transform="translate(320, 60)" filter="url(#shadow)">
    <!-- Top Face -->
    <polygon points="40,0 100,0 80,25 20,25" fill="#fb923c" />
    <!-- Front Face -->
    <polygon points="20,25 80,25 80,80 20,80" fill="#ea580c" />
    <!-- Side Face -->
    <polygon points="80,25 100,0 100,55 80,80" fill="#c2410c" />
    
    <!-- Text on the Front Face -->
    <text x="50" y="58" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">객체</text>
  </g>
</svg>
