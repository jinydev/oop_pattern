<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Subject (Left Box) -->
  <g transform="translate(30, 25)" filter="url(#shadow)">
    <rect width="160" height="130" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 152,0 A 8,8 0 0 1 160,8 L 160,30 L 0,30 Z" fill="#0f172a" />
    <text x="80" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">주체 (Subject)</text>
    
    <text x="80" y="55" font-family="'Inter', sans-serif" font-size="9" fill="#475569" text-anchor="middle">등록, 추가, 삭제를 관리</text>

    <!-- Internal array grid representation -->
    <g transform="translate(35, 75)">
      <rect x="0" y="0" width="90" height="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
      <rect x="0" y="15" width="90" height="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
      <rect x="0" y="30" width="90" height="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
      <text x="45" y="11" font-family="'Inter', sans-serif" font-size="8" fill="#1e3a8a" text-anchor="middle">Observer 1</text>
      <text x="45" y="26" font-family="'Inter', sans-serif" font-size="8" fill="#1e3a8a" text-anchor="middle">Observer 2</text>
      <text x="45" y="41" font-family="'Inter', sans-serif" font-size="8" fill="#1e3a8a" text-anchor="middle">Observer 3</text>
    </g>
  </g>

  <!-- Observer (Right Circle) -->
  <g transform="translate(250, 65)" filter="url(#shadow)">
    <circle cx="50" cy="25" r="25" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
    <text x="50" y="22" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">통보 객체</text>
    <text x="50" y="32" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#ffedd5" text-anchor="middle">(Observer)</text>
  </g>

  <!-- Arrow pointing from array grid to target observer -->
  <g>
    <path d="M 125,110 C 160,110 180,95 242,91" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="242,87 250,90 241,95" fill="#ea580c" />
  </g>
</svg>
