<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Box: 개발 코드 -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="100" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="101" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">개발 코드</text>
  </g>

  <!-- Middle Area: 메모리 Boundary -->
  <g>
    <!-- Boundary line -->
    <line x1="230" y1="40" x2="230" y2="160" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="330" y1="40" x2="330" y2="160" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="280" y="32" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">메모리</text>

    <!-- Inside Memory: 객체 Box -->
    <g filter="url(#shadow)">
      <rect x="245" y="70" width="70" height="50" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
      <text x="280" y="100" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">객체</text>
    </g>
  </g>

  <!-- Right Box: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="400" y="70" width="100" height="50" rx="6" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="450" y="100" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Arrow ① new -->
  <g>
    <line x1="130" y1="95" x2="235" y2="95" stroke="#94a3b8" stroke-width="2" />
    <polygon points="235,90 245,95 235,100" fill="#94a3b8" />
    <!-- Label -->
    <rect x="157" y="70" width="55" height="18" rx="3" fill="#f1f5f9" />
    <text x="184" y="83" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">① new</text>
  </g>

  <!-- Dotted line from 클래스 to 객체 -->
  <g>
    <line x1="400" y1="95" x2="315" y2="95" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="320,91 315,95 320,99" fill="#64748b" />
  </g>

  <!-- Arrow ② 의존성 발생 -->
  <g>
    <!-- Thick upward arrow to 개발 코드 -->
    <path d="M 280,140 L 80,140 L 80,128" fill="none" stroke="#0f172a" stroke-width="3" />
    <polygon points="75,129 80,120 85,129" fill="#0f172a" />
    <!-- Label -->
    <rect x="125" y="145" width="90" height="20" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="170" y="159" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">② 의존성 발생</text>
  </g>
</svg>
