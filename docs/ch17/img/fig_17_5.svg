<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Handler (Left) -->
  <g transform="translate(30, 30)" filter="url(#shadow)">
    <rect width="110" height="120" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="55" y="22" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">핸들러 (Handler)</text>
    
    <!-- Dispatcher Diamond -->
    <polygon points="55,40 85,65 55,90 25,65" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="55" y="68" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#1e3a8a" text-anchor="middle">분기</text>
  </g>

  <!-- Real Objects (Right) -->
  <!-- Real Object 1 -->
  <g transform="translate(220, 30)" filter="url(#shadow)">
    <rect width="120" height="45" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="60" y="26" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체 1 (ordered)</text>
  </g>

  <!-- Real Object 2 -->
  <g transform="translate(220, 105)" filter="url(#shadow)">
    <rect width="120" height="45" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <text x="60" y="26" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">실체 객체 2 (cancel)</text>
  </g>

  <!-- Routing arrows -->
  <g>
    <!-- Handler -> Real Object 1 -->
    <path d="M 115,95 C 150,95 160,55 212,55" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="209,51 218,55 210,59" fill="#64748b" />
    <text x="165" y="50" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#64748b" text-anchor="middle">메시지 전송</text>

    <!-- Handler -> Real Object 2 -->
    <path d="M 115,95 C 150,95 160,125 212,125" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="210,121 218,125 209,129" fill="#64748b" />
    <text x="165" y="140" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#64748b" text-anchor="middle">메시지 전송</text>
  </g>
</svg>
