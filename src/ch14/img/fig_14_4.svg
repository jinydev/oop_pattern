<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Iterator Object (Left) -->
  <g filter="url(#shadow)">
    <rect x="35" y="45" width="110" height="90" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="90" y="85" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">IteratorObject</text>
    <text x="90" y="100" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">(반복 제어 객체)</text>
  </g>

  <!-- Collection Container (Right) -->
  <g filter="url(#shadow)">
    <circle cx="280" cy="90" r="54" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <text x="280" y="55" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">컬렉션</text>

    <!-- Internal elements -->
    <rect x="255" y="70" width="50" height="18" rx="3" fill="#ea580c" />
    <rect x="255" y="98" width="50" height="18" rx="3" fill="#ea580c" />
  </g>

  <!-- Dotted arrows from collection slots to Iterator (Proxy/Surrogate access) -->
  <g>
    <path d="M 255,79 L 151,79" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" />
    <polygon points="151,82 145,79 151,76" fill="#ef4444" />

    <path d="M 255,107 L 151,107" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" />
    <polygon points="151,110 145,107 151,104" fill="#ef4444" />
  </g>

  <!-- Label in the middle -->
  <rect x="165" y="83" width="50" height="15" rx="3" fill="#fee2e2" />
  <text x="190" y="94" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#b91c1c" text-anchor="middle">대리 접근</text>
</svg>
