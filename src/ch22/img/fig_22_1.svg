<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Column 1 -->
  <g transform="translate(40, 20)">
    <!-- 시작 -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <rect width="100" height="30" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="50" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">시작</text>
    </g>

    <!-- 1단계 -->
    <g transform="translate(0, 55)" filter="url(#shadow)">
      <rect width="100" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
      <text x="50" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">1단계</text>
    </g>

    <!-- 2단계 -->
    <g transform="translate(0, 110)" filter="url(#shadow)">
      <rect width="100" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
      <text x="50" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">2단계</text>
    </g>

    <!-- Vertical arrows in Column 1 -->
    <path d="M 50,30 L 50,55" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="47,55 50,60 53,55" fill="#64748b" />

    <path d="M 50,85 L 50,110" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="47,110 50,115 53,110" fill="#64748b" />
  </g>

  <!-- Connection: 2단계 -> 3단계 -->
  <path d="M 140,145 L 200,145 L 200,35 L 235,35" fill="none" stroke="#ea580c" stroke-width="1.5" />
  <polygon points="235,31 243,35 235,39" fill="#ea580c" />

  <!-- Column 2 -->
  <g transform="translate(240, 20)">
    <!-- 3단계 -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <rect width="100" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
      <text x="50" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">3단계</text>
    </g>

    <!-- 4단계 -->
    <g transform="translate(0, 55)" filter="url(#shadow)">
      <rect width="100" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
      <text x="50" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">4단계</text>
    </g>

    <!-- 끝 -->
    <g transform="translate(0, 110)" filter="url(#shadow)">
      <rect width="100" height="30" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="50" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">끝</text>
    </g>

    <!-- Vertical arrows in Column 2 -->
    <path d="M 50,30 L 50,55" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="47,55 50,60 53,55" fill="#64748b" />

    <path d="M 50,85 L 50,110" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="47,110 50,115 53,110" fill="#64748b" />
  </g>
</svg>
