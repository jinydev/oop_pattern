<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Code Execution (Left) -->
  <g transform="translate(30, 30)" filter="url(#shadow)">
    <rect width="80" height="160" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="40" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">코드 실행</text>
    <!-- Jagged arrows indicating execution/polling -->
    <path d="M 40,45 L 25,65 L 55,85 L 25,105 L 55,125 L 40,145" fill="none" stroke="#3b82f6" stroke-width="2" />
    <polygon points="36,142 40,149 45,143" fill="#3b82f6" />
  </g>

  <!-- Event Loop Monitoring (Middle) -->
  <g transform="translate(180, 50)">
    <circle cx="60" cy="60" r="45" fill="none" stroke="#ea580c" stroke-width="2" />
    <circle cx="60" cy="60" r="35" fill="none" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,2" />
    
    <!-- Rotating arrow marks -->
    <path d="M 105,60 L 105,68 L 98,63 Z" fill="#ea580c" />
    <path d="M 15,60 L 15,52 L 22,57 Z" fill="#ea580c" />

    <text x="60" y="64" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">이벤트 감시</text>
  </g>

  <!-- Stacked Event Targets (Right) -->
  <!-- Event 1 -->
  <g transform="translate(380, 30)" filter="url(#shadow)">
    <rect width="100" height="40" rx="4" fill="#ef4444" stroke="#dc2626" stroke-width="1.5" />
    <text x="50" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">이벤트 A</text>
  </g>

  <!-- Event 2 -->
  <g transform="translate(380, 90)" filter="url(#shadow)">
    <rect width="100" height="40" rx="4" fill="#ef4444" stroke="#dc2626" stroke-width="1.5" />
    <text x="50" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">이벤트 B</text>
  </g>

  <!-- Event 3 -->
  <g transform="translate(380, 150)" filter="url(#shadow)">
    <rect width="100" height="40" rx="4" fill="#ef4444" stroke="#dc2626" stroke-width="1.5" />
    <text x="50" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">이벤트 C</text>
  </g>

  <!-- Interaction Flow lines -->
  <g>
    <!-- Code -> Monitoring -->
    <path d="M 115,110 L 175,110" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="175,106 183,110 175,114" fill="#64748b" />

    <!-- Monitoring -> Event A -->
    <path d="M 285,90 C 310,75 330,60 372,55" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="371,51 378,54 372,59" fill="#ea580c" />

    <!-- Monitoring -> Event B -->
    <path d="M 285,110 L 372,110" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="372,106 380,110 372,114" fill="#ea580c" />

    <!-- Monitoring -> Event C -->
    <path d="M 285,130 C 310,145 330,160 372,165" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="372,161 378,166 371,169" fill="#ea580c" />
  </g>
</svg>
