<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- 1: new 클래스 -->
  <text x="35" y="114" font-family="monospace" font-size="14" font-weight="bold" fill="#ef4444">new 클래스</text>

  <!-- 2: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="150" y="85" width="80" height="50" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="190" y="114" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- 3: Branching Objects on the right -->
  <!-- Object 1 -->
  <g filter="url(#shadow)">
    <rect x="290" y="35" width="100" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="59" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">객체: 값1</text>
  </g>

  <!-- Object 2 -->
  <g filter="url(#shadow)">
    <rect x="290" y="90" width="100" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="114" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">객체: 값2</text>
  </g>

  <!-- Object 3 -->
  <g filter="url(#shadow)">
    <rect x="290" y="145" width="100" height="40" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="169" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">객체: 값3</text>
  </g>

  <!-- Connectors -->
  <g>
    <path d="M 115,110 L 142,110" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="142,106 150,110 142,114" fill="#475569" />

    <!-- Branching lines from 클래스 to objects -->
    <!-- to Obj 1 -->
    <path d="M 230,110 L 260,110 L 260,55 L 282,55" fill="none" stroke="#475569" stroke-width="1.2" />
    <polygon points="282,51 290,55 282,59" fill="#475569" />

    <!-- to Obj 2 -->
    <path d="M 230,110 L 282,110" fill="none" stroke="#475569" stroke-width="1.2" />
    <polygon points="282,106 290,110 282,114" fill="#475569" />

    <!-- to Obj 3 -->
    <path d="M 230,110 L 260,110 L 260,165 L 282,165" fill="none" stroke="#475569" stroke-width="1.2" />
    <polygon points="282,161 290,165 282,169" fill="#475569" />
  </g>

  <!-- Side text description -->
  <g>
    <!-- Background box for the text -->
    <rect x="405" y="80" width="120" height="60" rx="4" fill="#fee2e2" stroke="#fecaca" stroke-width="1" />
    <text x="465" y="98" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">값만 틀린 동일 객체</text>
    <text x="465" y="112" font-family="'Inter', sans-serif" font-size="9" fill="#b91c1c" text-anchor="middle">생성 시간 × 개수</text>
    <text x="465" y="126" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#e11d48" text-anchor="middle">= 자원 소모 증가</text>
  </g>
</svg>
