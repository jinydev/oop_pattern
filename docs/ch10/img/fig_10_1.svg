<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Multiple component objects (Left) -->
  <g filter="url(#shadow)">
    <rect x="40" y="25" width="80" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="45" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">객체 A</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="40" y="74" width="80" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="94" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">객체 B</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="40" y="123" width="80" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="80" y="143" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">객체 C</text>
  </g>

  <!-- Unified combination target (Right) -->
  <g filter="url(#shadow)">
    <rect x="230" y="65" width="90" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" />
    <text x="275" y="90" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">단일화된 객체</text>
    <text x="275" y="103" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">(조합/통합)</text>
  </g>

  <!-- Merging Arrows -->
  <g>
    <!-- A -> Target -->
    <path d="M 120,41 L 180,41 L 222,80" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="219,84 228,85 225,78" fill="#64748b" />

    <!-- B -> Target -->
    <path d="M 120,90 L 222,90" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="222,86 230,90 222,94" fill="#64748b" />

    <!-- C -> Target -->
    <path d="M 120,139 L 180,139 L 222,100" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="225,102 228,95 219,96" fill="#64748b" />
  </g>
</svg>
