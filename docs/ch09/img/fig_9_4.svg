<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Root Circle (Top) -->
  <g filter="url(#shadow)">
    <circle cx="160" cy="40" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="160" y="44" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">Root</text>
  </g>

  <!-- Middle circles: Leaf (Left), Node (Right) -->
  <g filter="url(#shadow)">
    <circle cx="100" cy="110" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="100" y="114" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">Leaf</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="220" cy="110" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="220" y="114" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">Node</text>
  </g>

  <!-- Bottom circles under Node: Leaf (Left), Leaf (Right) -->
  <g filter="url(#shadow)">
    <circle cx="160" cy="180" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="160" y="184" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">Leaf</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="280" cy="180" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="280" y="184" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">Leaf</text>
  </g>

  <!-- Connections -->
  <g>
    <!-- Root -> Leaf -->
    <path d="M 143,57 L 117,93" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="114,90 113,97 120,95" fill="#64748b" />

    <!-- Root -> Node -->
    <path d="M 177,57 L 203,93" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="200,95 207,97 206,90" fill="#64748b" />

    <!-- Node -> Leaf (bottom left) -->
    <path d="M 203,127 L 177,163" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="174,160 173,167 180,165" fill="#64748b" />

    <!-- Node -> Leaf (bottom right) -->
    <path d="M 237,127 L 263,163" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="260,165 267,167 266,160" fill="#64748b" />
  </g>
</svg>
