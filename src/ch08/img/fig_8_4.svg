<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Hello Class Box -->
  <g filter="url(#shadow)">
    <rect x="100" y="30" width="120" height="36" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="160" y="52" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Hello 클래스</text>
  </g>

  <!-- Greeting Class Box -->
  <g filter="url(#shadow)">
    <rect x="100" y="110" width="120" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="160" y="132" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Greeting 클래스</text>
  </g>

  <!-- Inheritance Arrow: Greeting -> Hello -->
  <g>
    <path d="M 160,110 L 160,76" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="155,76 160,66 165,76" fill="none" stroke="#64748b" stroke-width="1.5" />
  </g>
</svg>
