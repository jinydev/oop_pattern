<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Language Abstraction Class Box (Left) -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 46,50 L 144,50 A 6,6 0 0 1 150,56 L 150,70 L 40,70 L 40,56 A 6,6 0 0 1 46,50 Z" fill="#0f172a" />
    <text x="95" y="63" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Language</text>

    <!-- Body -->
    <path d="M 40,70 L 150,70 L 150,124 A 6,6 0 0 1 144,130 L 46,130 A 6,6 0 0 1 40,124 Z" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
    <text x="50" y="88" font-family="monospace" font-size="9" fill="#475569">+$english</text>
    <text x="50" y="103" font-family="monospace" font-size="9" fill="#475569">+$korean</text>
    <text x="50" y="118" font-family="monospace" font-size="9" fill="#475569">+setEnglish()</text>
  </g>

  <!-- Hello Interface Box (Right Top) -->
  <g filter="url(#shadow)">
    <rect x="250" y="30" width="120" height="40" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="310" y="49" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#64748b" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text x="310" y="61" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Hello</text>
  </g>

  <!-- English Class Box (Right Bottom Left) -->
  <g filter="url(#shadow)">
    <rect x="210" y="130" width="90" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="255" y="152" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">English 클래스</text>
  </g>

  <!-- Korea Class Box (Right Bottom Right) -->
  <g filter="url(#shadow)">
    <rect x="330" y="130" width="90" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="375" y="152" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Korea 클래스</text>
  </g>

  <!-- Connections -->
  <g>
    <!-- Language -> Hello (Composition arrow) -->
    <path d="M 150,90 L 310,90 L 310,76" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="306,76 310,66 314,76" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <text x="230" y="82" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">구성/참조</text>

    <!-- English implements Hello -->
    <path d="M 255,130 L 255,108 L 295,108 L 295,76" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,2" />
    <polygon points="291,76 295,70 299,76" fill="#f8fafc" stroke="#64748b" stroke-width="1.2" />

    <!-- Korea implements Hello -->
    <path d="M 375,130 L 375,108 L 325,108 L 325,76" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,2" />
    <polygon points="321,76 325,70 329,76" fill="#f8fafc" stroke="#64748b" stroke-width="1.2" />
  </g>
</svg>
