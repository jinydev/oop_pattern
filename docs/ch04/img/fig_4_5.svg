<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top Circle: 추상 클래스 -->
  <g filter="url(#shadow)">
    <circle cx="220" cy="55" r="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="220" y="52" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">추상</text>
    <text x="220" y="65" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">클래스</text>
  </g>

  <!-- Left Circle: Client/Request -->
  <g filter="url(#shadow)">
    <circle cx="90" cy="150" r="24" fill="#ffffff" stroke="#ef4444" stroke-width="2.5" />
    <text x="90" y="154" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ef4444" text-anchor="middle">Client</text>
  </g>

  <!-- Bottom Circle: ??? 가상화 -->
  <g filter="url(#shadow)">
    <circle cx="220" cy="150" r="32" fill="#ffffff" stroke="#ea580c" stroke-width="2" stroke-dasharray="4,2" />
    <text x="220" y="145" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ea580c" text-anchor="middle">???</text>
    <text x="220" y="160" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#e11d48" text-anchor="middle">가상화</text>
  </g>

  <!-- Arrow from Top to Bottom: extends -->
  <g>
    <path d="M 220,85 L 220,118" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="216,118 220,126 224,118" fill="#94a3b8" />
    <text x="245" y="110" font-family="monospace" font-size="9" font-weight="bold" fill="#64748b" text-anchor="middle">extends</text>
  </g>

  <!-- Arrow from Client to Bottom: 생성 요청 -->
  <g>
    <path d="M 114,150 L 180,150" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />
    <polygon points="180,146 188,150 180,154" fill="#ef4444" />
    <text x="147" y="140" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">생성 요청</text>
  </g>
</svg>
