<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left Box: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="120" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="100" y="116" font-family="'Inter', sans-serif" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Multiple Arrows -->
  <g>
    <!-- Arrow 1 (Top) -->
    <path d="M 160,90 L 270,90" stroke="#94a3b8" stroke-width="2" />
    <polygon points="270,85 280,90 270,95" fill="#94a3b8" />
    <text x="215" y="80" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">인스턴스화</text>

    <!-- Arrow 2 (Middle) -->
    <path d="M 160,110 L 270,110" stroke="#94a3b8" stroke-width="2" />
    <polygon points="270,105 280,110 270,115" fill="#94a3b8" />
    <text x="215" y="125" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">new</text>

    <!-- Arrow 3 (Bottom) -->
    <path d="M 160,130 L 270,130" stroke="#94a3b8" stroke-width="2" />
    <polygon points="270,125 280,130 270,135" fill="#94a3b8" />
  </g>

  <!-- Right Stacked Blocks: 3D Objects -->
  <!-- Top Object -->
  <g transform="translate(320, 40)" filter="url(#shadow)">
    <polygon points="40,0 100,0 80,20 20,20" fill="#fb923c" />
    <polygon points="20,20 80,20 80,60 20,60" fill="#ea580c" />
    <polygon points="80,20 100,0 100,40 80,60" fill="#c2410c" />
    <text x="50" y="45" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">객체</text>
  </g>

  <!-- Middle Object -->
  <g transform="translate(320, 80)" filter="url(#shadow)">
    <polygon points="40,0 100,0 80,20 20,20" fill="#fb923c" />
    <polygon points="20,20 80,20 80,60 20,60" fill="#ea580c" />
    <polygon points="80,20 100,0 100,40 80,60" fill="#c2410c" />
    <text x="50" y="45" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">객체</text>
  </g>

  <!-- Bottom Object -->
  <g transform="translate(320, 120)" filter="url(#shadow)">
    <polygon points="40,0 100,0 80,20 20,20" fill="#fb923c" />
    <polygon points="20,20 80,20 80,60 20,60" fill="#ea580c" />
    <polygon points="80,20 100,0 100,40 80,60" fill="#c2410c" />
    <text x="50" y="45" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">객체</text>
  </g>
</svg>
