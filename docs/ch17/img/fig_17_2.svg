<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Dispatcher Diamond (Left) -->
  <g filter="url(#shadow)">
    <polygon points="90,40 150,90 90,140 30,90" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="90" y="93" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">메시지 전송</text>
  </g>

  <!-- Object Box (Right) -->
  <g transform="translate(210, 30)" filter="url(#shadow)">
    <rect width="130" height="120" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 122,0 A 8,8 0 0 1 130,8 L 130,30 L 0,30 Z" fill="#475569" />
    <text x="65" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">객체 (Object)</text>
    
    <!-- ordered method -->
    <rect x="15" y="45" width="100" height="24" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="65" y="60" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">ordered()</text>

    <!-- cancel method -->
    <rect x="15" y="80" width="100" height="24" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <text x="65" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">cancel()</text>
  </g>

  <!-- Dispatcher arrows -->
  <g>
    <!-- True path -> ordered() -->
    <path d="M 150,90 C 170,80 180,65 218,60" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="214,56 225,59 217,64" fill="#ea580c" />

    <!-- False path -> cancel() -->
    <path d="M 150,90 C 170,100 180,105 218,110" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="217,106 225,111 214,114" fill="#ef4444" />
  </g>
</svg>
