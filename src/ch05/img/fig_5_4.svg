<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- 복합 객체 (Outer Box) -->
  <g filter="url(#shadow)">
    <rect x="30" y="30" width="200" height="100" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <text x="130" y="55" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">복합 객체</text>
  </g>

  <!-- public (Inner Box) -->
  <g filter="url(#shadow)">
    <rect x="50" y="70" width="160" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="130" y="94" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">public</text>
  </g>

  <!-- 의존 객체 (Right Box) -->
  <g filter="url(#shadow)">
    <rect x="300" y="60" width="90" height="48" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="345" y="89" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">의존 객체</text>
  </g>

  <!-- Dotted Arrow crossing boundary -->
  <g>
    <path d="M 180,90 L 292,90" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" />
    <polygon points="292,86 300,90 292,94" fill="#ef4444" />
  </g>
</svg>
