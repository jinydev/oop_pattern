<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Top Arrow (Forward Action) -->
  <g>
    <path d="M 40,30 L 332,30" fill="none" stroke="#2563eb" stroke-width="2" />
    <polygon points="332,26 340,30 332,34" fill="#2563eb" />
    <text x="190" y="22" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">처리 로직 순서 (Normal Execution Flow)</text>
  </g>

  <!-- Three States -->
  <!-- State 1 -->
  <g transform="translate(30, 55)" filter="url(#shadow)">
    <rect width="80" height="36" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="40" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">상태 1</text>
  </g>

  <!-- State 2 -->
  <g transform="translate(150, 55)" filter="url(#shadow)">
    <rect width="80" height="36" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="40" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">상태 2</text>
  </g>

  <!-- State 3 -->
  <g transform="translate(270, 55)" filter="url(#shadow)">
    <rect width="80" height="36" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="40" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">상태 3</text>
  </g>

  <!-- Arrow between states -->
  <g>
    <path d="M 115,73 L 142,73" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="142,70 148,73 142,76" fill="#64748b" />
    <path d="M 235,73 L 262,73" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="262,70 268,73 262,76" fill="#64748b" />
  </g>

  <!-- Bottom Arrow (Reverse Action / Undo) -->
  <g>
    <path d="M 340,135 L 48,135" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,2" />
    <polygon points="48,131 40,135 48,139" fill="#ef4444" />
    <text x="190" y="152" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#991b1b" text-anchor="middle">역순의 복원 로직 작성 (Reverse/Undo Flow)</text>
  </g>
</svg>
