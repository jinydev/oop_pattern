<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Diamond (Decision block) -->
  <g filter="url(#shadow)">
    <polygon points="190,40 270,90 190,140 110,90" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <text x="190" y="94" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태값 (Condition)</text>
  </g>

  <!-- Branches -->
  <!-- True (Right) -->
  <g>
    <path d="M 270,90 L 335,90" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="335,86 343,90 335,94" fill="#ea580c" />
    <text x="305" y="82" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ea580c" text-anchor="middle">참 (True)</text>
  </g>

  <!-- False (Down) -->
  <g>
    <path d="M 190,140 L 190,165" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="186,165 190,173 194,165" fill="#ef4444" />
    <text x="225" y="160" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">거짓 (False)</text>
  </g>
</svg>
