<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Mediator (Center) -->
  <g transform="translate(135, 75)" filter="url(#shadow)">
    <rect width="110" height="50" rx="8" fill="#ea580c" stroke="#c2410c" stroke-width="2" />
    <text x="55" y="29" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">중재자</text>
    <text x="55" y="41" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#ffedd5" text-anchor="middle">(Mediator)</text>
  </g>

  <!-- Colleague Objects (Four Corners) -->
  <!-- Top-Left -->
  <g filter="url(#shadow)" transform="translate(30, 20)">
    <circle cx="25" cy="25" r="25" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" />
    <text x="25" y="29" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">객체 A</text>
  </g>

  <!-- Top-Right -->
  <g filter="url(#shadow)" transform="translate(300, 20)">
    <circle cx="25" cy="25" r="25" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" />
    <text x="25" y="29" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">객체 B</text>
  </g>

  <!-- Bottom-Left -->
  <g filter="url(#shadow)" transform="translate(30, 150)">
    <circle cx="25" cy="25" r="25" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" />
    <text x="25" y="29" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">객체 C</text>
  </g>

  <!-- Bottom-Right -->
  <g filter="url(#shadow)" transform="translate(300, 150)">
    <circle cx="25" cy="25" r="25" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" />
    <text x="25" y="29" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">객체 D</text>
  </g>

  <!-- Hub-and-Spoke bidirectional arrows -->
  <g>
    <!-- Mediator <-> Top-Left -->
    <path d="M 75,58 L 140,84" fill="none" stroke="#2563eb" stroke-width="1.5" />
    <polygon points="76,53 66,54 71,64" fill="#2563eb" />
    <polygon points="138,89 148,87 143,78" fill="#2563eb" />

    <!-- Mediator <-> Top-Right -->
    <path d="M 305,58 L 240,84" fill="none" stroke="#2563eb" stroke-width="1.5" />
    <polygon points="305,64 309,54 300,53" fill="#2563eb" />
    <polygon points="237,78 232,87 242,89" fill="#2563eb" />

    <!-- Mediator <-> Bottom-Left -->
    <path d="M 75,162 L 140,136" fill="none" stroke="#2563eb" stroke-width="1.5" />
    <polygon points="71,156 66,166 76,167" fill="#2563eb" />
    <polygon points="143,142 148,133 138,131" fill="#2563eb" />

    <!-- Mediator <-> Bottom-Right -->
    <path d="M 305,162 L 240,136" fill="none" stroke="#2563eb" stroke-width="1.5" />
    <polygon points="300,167 309,166 305,156" fill="#2563eb" />
    <polygon points="238,131 232,133 237,142" fill="#2563eb" />
  </g>
</svg>
