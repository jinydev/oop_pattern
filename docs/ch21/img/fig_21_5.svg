<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Vertical Sequence of States (Left) -->
  <!-- State 1 -->
  <g transform="translate(30, 20)" filter="url(#shadow)">
    <rect width="90" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="45" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태 1</text>
  </g>

  <!-- State 2 -->
  <g transform="translate(30, 90)" filter="url(#shadow)">
    <rect width="90" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="45" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태 2</text>
  </g>

  <!-- State 3 -->
  <g transform="translate(30, 160)" filter="url(#shadow)">
    <rect width="90" height="36" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="45" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태 3</text>
  </g>

  <!-- Vertical Connecting Arrows -->
  <g>
    <path d="M 75,58 L 75,88" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="71,88 75,94 79,88" fill="#64748b" />
    <path d="M 75,128 L 75,158" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="71,158 75,164 79,158" fill="#64748b" />
  </g>

  <!-- Storage Space (Right) -->
  <g transform="translate(240, 20)" filter="url(#shadow)">
    <!-- Container label -->
    <rect width="110" height="180" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <path d="M 0,8 A 8,8 0 0 1 8,0 L 102,0 A 8,8 0 0 1 110,8 L 110,25 L 0,25 Z" fill="#ea580c" />
    <text x="55" y="16" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">저장 공간 (Stack)</text>

    <!-- Layers of clone -->
    <g transform="translate(15, 40)">
      <rect width="80" height="32" rx="4" fill="#ffedd5" stroke="#f97316" stroke-width="1.2" />
      <text x="40" y="20" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">상태 1 복제본</text>
    </g>

    <g transform="translate(15, 85)">
      <rect width="80" height="32" rx="4" fill="#ffedd5" stroke="#f97316" stroke-width="1.2" />
      <text x="40" y="20" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">상태 2 복제본</text>
    </g>

    <g transform="translate(15, 130)">
      <rect width="80" height="32" rx="4" fill="#ffedd5" stroke="#f97316" stroke-width="1.2" />
      <text x="40" y="20" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#c2410c" text-anchor="middle">상태 3 복제본</text>
    </g>
  </g>

  <!-- Horizontal Cloned arrows -->
  <g>
    <!-- Clone 1 -->
    <path d="M 125,38 L 232,48" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2" />
    <polygon points="232,45 240,49 232,53" fill="#f97316" />
    <text x="175" y="38" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#c2410c" text-anchor="middle">상태 복제</text>

    <!-- Clone 2 -->
    <path d="M 125,108 L 232,113" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2" />
    <polygon points="232,110 240,114 232,118" fill="#f97316" />
    <text x="175" y="103" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#c2410c" text-anchor="middle">상태 복제</text>

    <!-- Clone 3 -->
    <path d="M 125,178 L 232,178" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2" />
    <polygon points="232,175 240,178 232,181" fill="#f97316" />
    <text x="175" y="172" font-family="'Inter', sans-serif" font-size="8" font-weight="bold" fill="#c2410c" text-anchor="middle">상태 복제</text>
  </g>
</svg>
