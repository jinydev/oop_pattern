<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Hello Class Box -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 46,30 L 174,30 A 6,6 0 0 1 180,36 L 180,50 L 40,50 L 40,36 A 6,6 0 0 1 46,30 Z" fill="#475569" />
    <text x="110" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Hello 클래스</text>

    <!-- Body -->
    <path d="M 40,50 L 180,50 L 180,94 A 6,6 0 0 1 174,100 L 46,100 A 6,6 0 0 1 40,94 Z" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="110" y="75" font-family="monospace" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">greeting()</text>
  </g>

  <!-- Greeting Class Box -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 286,30 L 414,30 A 6,6 0 0 1 420,36 L 420,50 L 280,50 L 280,36 A 6,6 0 0 1 286,30 Z" fill="#3b82f6" />
    <text x="350" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Greeting 클래스</text>

    <!-- Body -->
    <path d="M 280,50 L 420,50 L 420,94 A 6,6 0 0 1 414,100 L 286,100 A 6,6 0 0 1 280,94 Z" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="350" y="70" font-family="monospace" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">greeting()</text>
    <text x="350" y="85" font-family="monospace" font-size="10" font-weight="bold" fill="#3b82f6" text-anchor="middle">ko()</text>
  </g>

  <!-- Arrow: Hello -> Greeting representing expansion -->
  <g>
    <path d="M 180,65 L 272,65" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="272,61 280,65 272,69" fill="#ef4444" />
    <text x="230" y="55" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">상속 확장</text>
  </g>
</svg>
