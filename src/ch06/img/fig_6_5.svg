<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Flow Items -->
  <!-- 1: new 클래스 -->
  <text x="35" y="114" font-family="monospace" font-size="14" font-weight="bold" fill="#ef4444">new 클래스</text>

  <!-- 2: 클래스 -->
  <g filter="url(#shadow)">
    <rect x="150" y="85" width="80" height="50" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.5" />
    <text x="190" y="114" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">클래스</text>
  </g>

  <!-- Objects on the right -->
  <!-- Object 1 (Heavy creation) -->
  <g filter="url(#shadow)">
    <rect x="290" y="25" width="110" height="42" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <text x="345" y="44" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0f172a" text-anchor="middle">객체: 값1</text>
    <text x="345" y="56" font-family="'Inter', sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">(생성 시간 1초)</text>
  </g>

  <!-- Object 2 (Cloned) -->
  <g filter="url(#shadow)">
    <rect x="290" y="88" width="110" height="42" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="345" y="107" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체: 값2</text>
    <text x="345" y="119" font-family="'Inter', sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">(복제 0.1초)</text>
  </g>

  <!-- Object 3 (Cloned) -->
  <g filter="url(#shadow)">
    <rect x="290" y="150" width="110" height="42" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="345" y="169" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체: 값3</text>
    <text x="345" y="181" font-family="'Inter', sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">(복제 0.1초)</text>
  </g>

  <!-- Connectors -->
  <g>
    <!-- new -> class -->
    <path d="M 115,110 L 142,110" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="142,106 150,110 142,114" fill="#475569" />

    <!-- class -> Object 1 -->
    <path d="M 230,110 L 255,110 L 255,46 L 282,46" fill="none" stroke="#475569" stroke-width="1.5" />
    <polygon points="282,42 290,46 282,50" fill="#475569" />

    <!-- Clone Arrows (Object 1 -> Object 2 -> Object 3) -->
    <path d="M 345,71 L 345,82" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="341,82 345,87 349,82" fill="#3b82f6" />

    <path d="M 345,134 L 345,145" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="341,145 345,149 349,145" fill="#3b82f6" />
  </g>

  <!-- Side text description -->
  <g>
    <rect x="415" y="80" width="115" height="60" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" />
    <text x="472" y="98" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">복제시 자원 절약</text>
    <text x="472" y="112" font-family="'Inter', sans-serif" font-size="8" fill="#1e40af" text-anchor="middle">1초 + 0.1초 + 0.1초</text>
    <text x="472" y="126" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8" text-anchor="middle">= 총 1.2초 소요</text>
  </g>
</svg>
