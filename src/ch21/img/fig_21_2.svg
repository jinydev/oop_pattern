<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Vertical Sequence of States -->
  <!-- State 1 -->
  <g transform="translate(60, 20)" filter="url(#shadow)">
    <rect width="120" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="60" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태 1 (State 1)</text>
  </g>

  <!-- State 2 -->
  <g transform="translate(60, 95)" filter="url(#shadow)">
    <rect width="120" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="60" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태 2 (State 2)</text>
  </g>

  <!-- State 3 -->
  <g transform="translate(60, 170)" filter="url(#shadow)">
    <rect width="120" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="60" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">상태 3 (State 3)</text>
  </g>

  <!-- Red Nodes and Checkpoints (Right) -->
  <g>
    <!-- Start point node -->
    <circle cx="240" cy="38" r="5" fill="#ef4444" />
    <path d="M 240,38 L 300,38" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" />
    <text x="310" y="41" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="start">체크 포인트</text>

    <!-- Node 2 -->
    <circle cx="240" cy="113" r="5" fill="#ef4444" />
    <path d="M 240,113 L 300,113" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" />
    <text x="310" y="116" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="start">체크 포인트</text>

    <!-- Node 3 -->
    <circle cx="240" cy="188" r="5" fill="#ef4444" />
    <path d="M 240,188 L 300,188" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" />
    <text x="310" y="191" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="start">체크 포인트</text>

    <!-- Vertical arrows with red dots -->
    <path d="M 120,56 L 120,95" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="116,95 120,101 124,95" fill="#64748b" />
    <!-- Link from flow to dot -->
    <path d="M 120,75 L 235,75" fill="none" stroke="#ea580c" stroke-width="1" stroke-dasharray="2,2" />

    <path d="M 120,131 L 120,170" fill="none" stroke="#64748b" stroke-width="1.5" />
    <polygon points="116,170 120,176 124,170" fill="#64748b" />
    <!-- Link from flow to dot -->
    <path d="M 120,150 L 235,150" fill="none" stroke="#ea580c" stroke-width="1" stroke-dasharray="2,2" />
  </g>
</svg>
