<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: 개발 코드 -->
  <text x="35" y="114" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#0f172a">개발 코드</text>

  <!-- Middle: 빌더 패턴 (Builder Pattern) -->
  <g filter="url(#shadow)">
    <rect x="150" y="70" width="110" height="70" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" />
    <text x="205" y="102" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">빌더 패턴</text>
    <text x="205" y="118" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(Builder Pattern)</text>
  </g>

  <!-- Right: 알고리즘 1, 2, 3 (Dashed Circles) -->
  <!-- 알고리즘1 -->
  <g filter="url(#shadow)">
    <circle cx="430" cy="55" r="26" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="430" y="52" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">알고리즘</text>
    <text x="430" y="63" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">1</text>
  </g>

  <!-- 알고리즘2 -->
  <g filter="url(#shadow)">
    <circle cx="430" cy="110" r="26" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="430" y="107" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">알고리즘</text>
    <text x="430" y="118" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">2</text>
  </g>

  <!-- 알고리즘3 -->
  <g filter="url(#shadow)">
    <circle cx="430" cy="165" r="26" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="430" y="162" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">알고리즘</text>
    <text x="430" y="173" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">3</text>
  </g>

  <!-- Connections -->
  <g>
    <!-- Request: 개발 코드 -> 빌더 패턴 -->
    <path d="M 100,110 L 142,110" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <polygon points="142,106 150,110 142,114" fill="#3b82f6" />
    <text x="120" y="90" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">① 복합 객체</text>
    <text x="120" y="101" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">생성 요청</text>

    <!-- Branching arrows: 빌더 패턴 -> 알고리즘 1, 2, 3 -->
    <!-- to 알고리즘1 -->
    <path d="M 260,105 L 340,105 L 340,55 L 396,55" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,3" />
    <polygon points="396,51 404,55 396,59" fill="#ef4444" />

    <!-- to 알고리즘2 -->
    <path d="M 260,105 L 396,105" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,3" />
    <polygon points="396,101 404,105 396,109" fill="#ef4444" />

    <!-- to 알고리즘3 -->
    <path d="M 260,105 L 340,105 L 340,165 L 396,165" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,3" />
    <polygon points="396,161 404,165 396,169" fill="#ef4444" />

    <!-- Label above branches: 알고리즘 교체 -->
    <rect x="295" y="85" width="80" height="18" rx="3" fill="#fee2e2" />
    <text x="335" y="98" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">알고리즘 교체</text>
  </g>
</svg>
