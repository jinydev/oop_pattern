<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 160" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Data/Function elements (Left) -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <!-- Data element 1 -->
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
    <text x="40" y="15" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">데이터 (변수)</text>

    <!-- Function element 2 -->
    <rect x="10" y="32" width="80" height="24" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
    <text x="50" y="47" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">로직 (함수)</text>
  </g>

  <!-- Encapsulated Object Container (Right) -->
  <g transform="translate(230, 40)" filter="url(#shadow)">
    <rect x="0" y="0" width="110" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <text x="55" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">객체 (Object)</text>
    
    <!-- Encapsulated data/logic internally -->
    <rect x="15" y="35" width="80" height="16" rx="2" fill="#ffffff" stroke="#3b82f6" stroke-width="1" />
    <text x="55" y="46" font-family="'Inter', sans-serif" font-size="8" fill="#1e40af" text-anchor="middle">프로퍼티</text>

    <rect x="15" y="55" width="80" height="16" rx="2" fill="#ffffff" stroke="#3b82f6" stroke-width="1" />
    <text x="55" y="66" font-family="'Inter', sans-serif" font-size="8" fill="#1e40af" text-anchor="middle">메서드</text>
  </g>

  <!-- Encapsulation Arrow -->
  <g>
    <path d="M 145,80 L 217,80" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" />
    <polygon points="217,76 225,80 217,84" fill="#ef4444" />
    <text x="185" y="70" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">캡슐화</text>
  </g>
</svg>
