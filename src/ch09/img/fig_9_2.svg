<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Computer Class Box (Left) -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 46,40 L 174,40 A 6,6 0 0 1 180,46 L 180,60 L 40,60 L 40,46 A 6,6 0 0 1 46,40 Z" fill="#0f172a" />
    <text x="110" y="53" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Computer 클래스</text>

    <!-- Body -->
    <path d="M 40,60 L 180,60 L 180,164 A 6,6 0 0 1 174,170 L 46,170 A 6,6 0 0 1 40,164 Z" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
    <text x="110" y="85" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Monitor</text>
    <text x="110" y="115" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Disk</text>
    <text x="110" y="145" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">$Memory</text>
  </g>

  <!-- Component Circles (Right) -->
  <!-- Monitor Class -->
  <g filter="url(#shadow)">
    <circle cx="340" cy="55" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="52" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Monitor</text>
    <text x="340" y="63" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Disk Class -->
  <g filter="url(#shadow)">
    <circle cx="340" cy="115" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="112" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Disk</text>
    <text x="340" y="123" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Memory Class -->
  <g filter="url(#shadow)">
    <circle cx="340" cy="175" r="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="172" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Memory</text>
    <text x="340" y="183" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">클래스</text>
  </g>

  <!-- Connection Arrows -->
  <g>
    <!-- Monitor -> $Monitor -->
    <path d="M 312,55 L 190,80" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="191,84 182,82 189,76" fill="#ea580c" />

    <!-- Disk -> $Disk -->
    <path d="M 312,115 L 182,115" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="190,115 182,115 190,111" fill="#ea580c" />

    <!-- Memory -> $Memory -->
    <path d="M 312,175 L 190,150" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="189,154 182,148 191,146" fill="#ea580c" />
  </g>
</svg>
