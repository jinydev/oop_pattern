<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Variable Assignment Box (Left) -->
  <g transform="translate(30, 50)" filter="url(#shadow)">
    <rect width="130" height="45" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="65" y="27" font-family="monospace" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">$변수 = "aaa";</text>
  </g>

  <!-- Function Box (Right) -->
  <g transform="translate(260, 50)" filter="url(#shadow)">
    <rect width="120" height="45" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="2" />
    <text x="60" y="27" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ea580c" text-anchor="middle">aaa() 함수</text>
  </g>

  <!-- Flow connecting arrow -->
  <g>
    <path d="M 160,72 L 252,72" fill="none" stroke="#2563eb" stroke-width="1.5" />
    <polygon points="252,68 260,72 252,76" fill="#2563eb" />
    <text x="210" y="62" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#2563eb" text-anchor="middle">가변 함수 호출</text>
  </g>
</svg>
