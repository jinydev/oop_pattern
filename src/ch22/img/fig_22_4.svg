<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 180" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <g transform="translate(15, 25)">
    <!-- SandWich 1 -->
    <g transform="translate(0, 0)">
      <rect width="100" height="130" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" />
      <g transform="translate(10, 25) scale(0.6)">
        <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
        <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
        <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      </g>
      <text x="50" y="120" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">make()</text>
    </g>

    <!-- Arrow 1 -> 2 -->
    <path d="M 105,65 L 125,65" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="125,62 131,65 125,68" fill="#ef4444" />

    <!-- SandWich 2 -->
    <g transform="translate(135, 0)">
      <rect width="100" height="130" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" />
      <g transform="translate(10, 25) scale(0.6)">
        <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
        <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
        <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      </g>
      <text x="50" y="120" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">make()</text>
    </g>

    <!-- Arrow 2 -> 3 -->
    <path d="M 240,65 L 260,65" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="260,62 266,65 260,68" fill="#ef4444" />

    <!-- SandWich 3 -->
    <g transform="translate(270, 0)">
      <rect width="100" height="130" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" />
      <g transform="translate(10, 25) scale(0.6)">
        <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
        <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
        <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      </g>
      <text x="50" y="120" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">make()</text>
    </g>

    <!-- Arrow 3 -> 4 -->
    <path d="M 375,65 L 395,65" fill="none" stroke="#ef4444" stroke-width="1.5" />
    <polygon points="395,62 401,65 395,68" fill="#ef4444" />

    <!-- SandWich 4 -->
    <g transform="translate(405, 0)">
      <rect width="100" height="130" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" />
      <g transform="translate(10, 25) scale(0.6)">
        <path d="M 10,130 Q 70,175 130,130 L 130,110 L 10,110 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
        <rect x="0" y="80" width="140" height="24" rx="4" fill="#ea580c" stroke="#c2410c" stroke-width="1.5" />
        <path d="M 10,50 Q 70,5 130,50 L 130,70 L 10,70 Z" fill="#fdba74" stroke="#f97316" stroke-width="1.5" />
      </g>
      <text x="50" y="120" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">make()</text>
    </g>
