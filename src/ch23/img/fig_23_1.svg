<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Outer meeting ring -->
  <g transform="translate(180, 110)" filter="url(#shadow)">
    <!-- Round Table -->
    <circle r="75" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
    <circle r="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- Strategy Board in the center -->
    <rect x="-25" y="-20" width="50" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <line x1="-15" y1="-8" x2="15" y2="-8" stroke="#2563eb" stroke-width="2" />
    <line x1="-15" y1="0" x2="5" y2="0" stroke="#3b82f6" stroke-width="1.5" />
    <line x1="-15" y1="8" x2="10" y2="8" stroke="#3b82f6" stroke-width="1.5" />

    <!-- Meeting Participants (People Nodes) -->
    <!-- Top -->
    <g transform="translate(0, -75)">
      <circle r="14" fill="#3b82f6" />
      <path d="M -8,8 Q 0,0 8,8" fill="none" stroke="#ffffff" stroke-width="2" />
      <circle cx="0" cy="-2" r="4" fill="#ffffff" />
    </g>
    <!-- Right Top -->
    <g transform="translate(65, -38)">
      <circle r="14" fill="#64748b" />
      <path d="M -8,8 Q 0,0 8,8" fill="none" stroke="#ffffff" stroke-width="2" />
      <circle cx="0" cy="-2" r="4" fill="#ffffff" />
    </g>
    <!-- Right Bottom -->
    <g transform="translate(65, 38)">
      <circle r="14" fill="#64748b" />
      <path d="M -8,8 Q 0,0 8,8" fill="none" stroke="#ffffff" stroke-width="2" />
      <circle cx="0" cy="-2" r="4" fill="#ffffff" />
    </g>
    <!-- Bottom -->
    <g transform="translate(0, 75)">
      <circle r="14" fill="#3b82f6" />
      <path d="M -8,8 Q 0,0 8,8" fill="none" stroke="#ffffff" stroke-width="2" />
      <circle cx="0" cy="-2" r="4" fill="#ffffff" />
    </g>
    <!-- Left Bottom -->
    <g transform="translate(-65, 38)">
      <circle r="14" fill="#64748b" />
      <path d="M -8,8 Q 0,0 8,8" fill="none" stroke="#ffffff" stroke-width="2" />
      <circle cx="0" cy="-2" r="4" fill="#ffffff" />
    </g>
    <!-- Left Top -->
    <g transform="translate(-65, -38)">
      <circle r="14" fill="#64748b" />
      <path d="M -8,8 Q 0,0 8,8" fill="none" stroke="#ffffff" stroke-width="2" />
      <circle cx="0" cy="-2" r="4" fill="#ffffff" />
    </g>

    <!-- Discussion lines -->
    <path d="M -40,-20 Q -10,-40 25,-40" fill="none" stroke="#f59e0b" stroke-dasharray="2,2" stroke-width="1.2" />
    <path d="M -40,20 Q 0,45 40,20" fill="none" stroke="#10b981" stroke-dasharray="2,2" stroke-width="1.2" />
  </g>

  <!-- Title Indicator -->
  <text x="15" y="25" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569">전략 (Strategy): 무엇을 할 것인가? (What To)</text>
</svg>
