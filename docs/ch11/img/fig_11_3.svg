<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <!-- Left: Facade Class Container -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <path d="M 46,65 L 144,65 A 6,6 0 0 1 150,71 L 150,85 L 40,85 L 40,71 A 6,6 0 0 1 46,65 Z" fill="#3b82f6" />
    <text x="95" y="78" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">파사드</text>

    <!-- Body with circles representing interface entry points -->
    <path d="M 40,85 L 150,85 L 150,205 A 6,6 0 0 1 144,211 L 46,211 A 6,6 0 0 1 40,205 Z" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Circle 1 -->
    <circle cx="95" cy="110" r="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="95" y="114" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">A</text>

    <!-- Circle 2 -->
    <circle cx="95" cy="148" r="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="95" y="152" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">B</text>

    <!-- Circle 3 -->
    <circle cx="95" cy="186" r="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="95" y="190" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a" text-anchor="middle">C</text>
  </g>

  <!-- Right: Sub-System Hierarchy Box -->
  <rect x="230" y="45" width="250" height="190" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="245" y="65" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#94a3b8">서브 시스템 계층 구조</text>

  <!-- Hierarchical subsystem layers -->
  <!-- Level 1 (Top) -->
  <g filter="url(#shadow)">
    <rect x="290" y="80" width="130" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="355" y="100" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">상위 단계 모듈 (L1)</text>
  </g>

  <!-- Level 2 (Middle) -->
  <g filter="url(#shadow)">
    <rect x="290" y="130" width="130" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="355" y="150" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">중간 단계 모듈 (L2)</text>
  </g>

  <!-- Level 3 (Bottom) -->
  <g filter="url(#shadow)">
    <rect x="290" y="180" width="130" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="355" y="200" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">하위 단계 모듈 (L3)</text>
  </g>

  <!-- Direct step-by-step access arrows from Facade circle ports directly to layers -->
  <g>
    <!-- Facade Port A -> Level 1 -->
    <path d="M 107,110 L 282,110" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="282,106 290,110 282,114" fill="#ea580c" />

    <!-- Facade Port B -> Level 2 -->
    <path d="M 107,148 L 282,148" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="282,144 290,148 282,152" fill="#ea580c" />

    <!-- Facade Port C -> Level 3 -->
    <path d="M 107,186 L 282,186" fill="none" stroke="#ea580c" stroke-width="1.5" />
    <polygon points="282,182 290,186 282,190" fill="#ea580c" />
  </g>
</svg>
